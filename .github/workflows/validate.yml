name: Validate Derivations

on:
  push:
    branches: [main]
    paths:
      - 'layer1/**'
      - 'validate_derivations.py'
  pull_request:
    branches: [main]
    paths:
      - 'layer1/**'
      - 'validate_derivations.py'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run derivation validator
        run: python3 validate_derivations.py layer1/
