- id: kernel.least_action
  statement: 'The actual path taken by a physical system between two states extremizes the action integral: delta S = delta
    integral L dt = 0'
  about:
  - qty.action
  under:
  - classical_limit
  layer: kernel
  _from: []
- id: law.euler_lagrange
  statement: 'The condition delta S = 0 yields the Euler-Lagrange equation: d/dt(partial L / partial q-dot) - partial L /
    partial q = 0'
  about:
  - qty.action
  under:
  - classical_limit
  - conservative_force
  layer: kernel
  _from: []
- id: law.noether_theorem
  statement: 'Every continuous symmetry of the action corresponds to a conserved current. For transformations q_i -> q_i +
    epsilon*Q_i that leave the action invariant, Q = sum_i (partial L / partial q-dot_i)*Q_i - F is conserved: dQ/dt = 0'
  about:
  - qty.action
  - qty.energy
  - qty.momentum
  - qty.angular_momentum
  - qty.electric_charge
  under: []
  layer: law
  _from:
  - kernel.least_action
  - kernel.spacetime_dimensionality
- id: law.noether_conservation_examples
  statement: Time-translation invariance -> energy conservation; Space-translation invariance -> momentum conservation; Rotational
    invariance -> angular momentum conservation; U(1) gauge invariance -> electric charge conservation
  about:
  - qty.energy
  - qty.momentum
  - qty.angular_momentum
  - qty.electric_charge
  under: []
  layer: law
  _from:
  - law.noether_theorem
- id: kernel.gauge_interactions
  statement: 'Gauge symmetry determines fundamental interactions: U(1) -> electromagnetism (photon); SU(2) -> weak force (W+,
    W-, Z0); SU(3) -> strong force (gluons)'
  about:
  - qty.electric_charge
  under: []
  layer: kernel
  _from: []
- id: kernel.superposition_principle
  statement: 'A quantum state is described by a complex vector in a Hilbert space: |psi> = alpha*|psi1> + beta*|psi2>. Any
    linear combination of legal states is also a legal state'
  about:
  - qty.state_vector
  - qty.complex_amplitude
  under:
  - quantum_regime
  layer: kernel
  _from: []
- id: kernel.operator_observable
  statement: Physical observables correspond to Hermitian operators. Measurement outcomes are eigenvalues of the corresponding
    operator
  about:
  - qty.state_vector
  - qty.quantum_number
  under:
  - quantum_regime
  layer: kernel
  _from: []
- id: kernel.unitary_evolution
  statement: 'The time evolution of an isolated quantum system is unitary: i*hbar*d(psi)/dt = H*psi (Schroedinger equation).
    This preserves total probability: sum_i P_i = 1'
  about:
  - qty.state_vector
  - cst.reduced_planck
  - qty.time
  under:
  - quantum_regime
  - isolated_system
  layer: kernel
  _from: []
- id: kernel.canonical_commutation
  statement: Canonically conjugate variables satisfy [x, p] = i*hbar. This is the structural divide between quantum and classical
    physics
  about:
  - qty.length
  - qty.momentum
  - cst.reduced_planck
  under:
  - quantum_regime
  layer: kernel
  _from: []
- id: kernel.born_rule
  statement: 'The probability of a measurement outcome is given by the squared modulus of the state amplitude: P = |psi|^2'
  about:
  - qty.probability_density
  - qty.state_vector
  under:
  - quantum_regime
  layer: kernel
  _from: []

- id: kernel.light_speed_invariance
  statement: The speed of light in vacuum c = 2.99792458 x 10^8 m/s is the same in all inertial reference frames. It is the
    maximum speed of causal influence
  about:
  - cst.speed_of_light
  under: []
  layer: kernel
  _from: []
- id: kernel.equivalence_principle
  statement: 'Inertial mass equals gravitational mass: m_i = m_g. Locally, it is impossible to distinguish a gravitational
    field from an accelerated reference frame'
  about:
  - qty.mass
  - qty.gravitational_mass
  under: []
  layer: kernel
  _from: []
- id: kernel.general_covariance
  statement: 'Physical laws take the same form in all coordinate systems. Consequence: gravity = spacetime curvature, described
    by the Einstein field equations'
  about:
  - qty.metric_tensor
  - qty.einstein_tensor
  - qty.stress_energy_tensor
  under:
  - relativistic_regime
  layer: kernel
  _from: []
- id: kernel.lorentz_invariance
  statement: The spacetime interval Delta_s^2 = c^2*Delta_t^2 - |Delta_r|^2 is invariant under transformations between inertial
    frames. This defines the causal structure of spacetime
  about:
  - qty.spacetime_interval
  - cst.speed_of_light
  - qty.time
  - qty.length
  under:
  - relativistic_regime
  layer: kernel
  _from: []

- id: kernel.boltzmann_entropy
  statement: 'Entropy is proportional to the logarithm of the number of accessible microstates: S = k_B * ln(W). This provides
    the statistical foundation for the second law'
  about:
  - qty.entropy
  - cst.boltzmann
  under:
  - macroscopic_limit
  - thermal_equilibrium
  layer: kernel
  _from: []
  _from: []
- id: kernel.spacetime_dimensionality
  # Rationale: unverified extra-dimensional theories cannot demote this non-inferable kernel premise.
  statement: spatial_dim(D)=3, temporal_dim=1; basic kernel premise/rule for dimension-specific formulas, not derived from later calculations
  about:
  - qty.time
  - qty.length
  under: []
  layer: kernel
  _from: []
- id: contingent.sm_gauge_group
  statement: gauge_group=SU(3)_C × SU(2)_L × U(1)_Y
  about:
  - qty.color_charge
  - qty.weak_isospin
  - qty.weak_hypercharge
  under: []
  layer: kernel
  _from: []
- id: contingent.sm_fermion_content
  statement: '3 generations of chiral fermions: Q_L(3,2,1/6), u_R(3,1,2/3), d_R(3,1,-1/3), L_L(1,2,-1/2), e_R(1,1,-1). Antiparticles
    form conjugate representations'
  about:
  - qty.generation
  - qty.color_charge
  - qty.weak_isospin
  - qty.weak_hypercharge
  under: []
  layer: kernel
  _from: []
- id: contingent.sm_higgs_sector
  statement: 'One complex scalar SU(2)_L doublet phi with Y=1. Spontaneous symmetry breaking: SU(2)_L × U(1)_Y → U(1)_EM at
    v ~ 246 GeV. Three Goldstone bosons become longitudinal W^+/-, Z modes; one physical Higgs boson h remains'
  about:
  - qty.higgs_vev
  - qty.weak_mixing_angle
  - qty.electric_charge
  under: []
  layer: kernel
  _from: []
- id: rule.conservation_continuity
  statement: 'Every conserved quantity has a local continuity equation of the form partial_mu*J^mu = 0. Energy: partial_mu*T^mu_nu
    = 0; Charge: div(J) + partial_rho/partial_t = 0; Probability: div(j) + partial|psi|^2/partial_t = 0'
  about:
  - qty.energy
  - qty.momentum
  - qty.electric_charge
  - qty.probability_density
  under: []
  layer: rule
  _from: []
- id: rule.empirical_verification_boundary
  # Implication: such theories cannot override empirically established non-inferable kernel premises.
  statement: Experimentally unconfirmed theories are not trusted adjudicators for kernel placement
  about: []
  under: []
  layer: rule
  _from: []
- id: rule.dimensional_consistency
  statement: 'Two quantities can appear in an equation, sum, or difference if and only if their dimension vectors are equal:
    dim(A) = dim(B). Multiplication: dim(A*B) = dim(A) + dim(B). Division: dim(A/B) = dim(A) - dim(B)'
  about: []
  under: []
  layer: rule
  _from: []
- id: law.newton_first
  statement: 'In the absence of net external force, an object maintains its state of uniform motion: F = 0 implies dv/dt =
    0'
  about:
  - qty.force
  - qty.velocity
  - qty.time
  under:
  - inertial_frame
  - classical_limit
  layer: law
  _from:
  - kernel.least_action
- id: law.newton_second
  statement: 'The net force on an object equals the rate of change of its momentum: F = dp/dt. For constant mass: F = ma'
  about:
  - qty.force
  - qty.momentum
  - qty.mass
  - qty.acceleration
  - qty.time
  under:
