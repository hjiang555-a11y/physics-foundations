derivations:
- id: deriv.euler_lagrange
  premise:
  - kernel.least_action
  - kernel.spacetime_dimensionality
  steps:
  - Start from the action functional S = ∫L(q, q-dot, t) dt.
  - Apply δS = 0 for variations with fixed endpoints.
  - Integrate by parts to move derivatives off δq.
  - Because δq is arbitrary, the integrand must vanish.
  - Therefore d/dt(dL/dq-dot) - dL/dq = 0.
  conclusion: law.euler_lagrange
  mathematical_link: δ∫Ldt = 0 => d/dt(dL/dq-dot) - dL/dq = 0
  validity_scope:
  - classical_limit
  - conservative_force
  sources:
  - Euler (1744)
  - Lagrange (1788)
  - Goldstein §2.1
  necessity_conditions:
  - 'R2 (δS = 0): 若无，Step 8 无依据'
  - '固定端点变分: 若无 δq(t₁)=δq(t₂)=0，Step 6 边界项不消失'
  - 'L ∈ C²: L 必须二阶连续可微，否则 Taylor 展开不合法'
  - 'δqᵢ 任意且独立: 若无，变分学引理不适用'
  - 'R1 定义的时间坐标 t: 积分参数必须是一维连续统'
  sufficiency_conditions:
  - 给定 C² 拉格朗日量 L(q,q̇,t) 和固定端点，δS=0 ⇔ Euler-Lagrange 方程
  - '[S] R2 + 固定端点 + C² L ⇒ Euler-Lagrange'
  reversible: true
- id: deriv.noether_theorem
  premise:
  - kernel.least_action
  - kernel.spacetime_dimensionality
  steps:
  - Start from an action S whose value is invariant under a continuous one-parameter transformation.
  - Apply the least-action condition to the transformed path and keep first-order terms in the transformation parameter.
  - Use integration by parts and the Euler-Lagrange on-shell condition to isolate a total divergence or total time derivative.
  - The total derivative defines the Noether current or charge associated with the continuous symmetry.
  - Therefore every continuous symmetry of the action corresponds to a conserved current within the stated spacetime structure.
  conclusion: law.noether_theorem
  mathematical_link: continuous symmetry of S + delta S = 0 => conserved Noether current
  validity_scope: []
  sources:
  - Noether (1918)
  - Goldstein §12.7
  necessity_conditions:
  - 'R2 (δS = 0): Euler-Lagrange 方程是推导的必要中间步骤（Step 4）'
  - 'R1 (时间坐标): 全导数 d/dt 要求时间在 R1 定义下是连续坐标'
  - '连续对称性: 必须有 Lie 群结构 → 无穷小生成元 Qᵢ 存在'
  - 'C² L: 偏导数存在且连续'
  - 'Euler-Lagrange 方程成立: 沿真实路径（on-shell）'
  sufficiency_conditions:
  - '[S] 连续对称性 + Euler-Lagrange 方程 ⇒ 守恒流存在'
  - Noether 定理是充要的：每个守恒量对应一个对称性（逆 Noether 定理也成立）
  reversible: true
- id: deriv.newton_second
  premise:
  - kernel.least_action
  - law.euler_lagrange
  - kernel.spacetime_dimensionality
  steps:
  - 'Define Lagrangian L = T - U for classical particle: L = (1/2)*m*v^2 - V(r)'
  - 'Apply Euler-Lagrange equation: d/dt(dL/dq-dot) - dL/dq = 0'
  - 'For coordinate q = r: dL/dr-dot = m*v, dL/dr = -grad(V)'
  - Therefore d(m*v)/dt = -grad(V)
  - Define force F = -grad(V), yielding F = dp/dt
  conclusion: law.newton_second
  mathematical_link: d/dt(dL/dq-dot) - dL/dq = 0 => d(m*v)/dt = -grad(V)
  validity_scope:
  - classical_limit
  - inertial_frame
  - conservative_force
  sources:
  - Goldstein §1.4, §2.1
  - Landau & Lifshitz §1, §2
  necessity_conditions:
  - Euler-Lagrange 方程 [N]（来自 R2）
  - 'L = T − V 的形式 [N]: 势能 V 必须存在（保守力）'
  - 'R1 的惯性系 [N]: 仅在此类参考系中成立'
  - 'm 为常数: 对于变质量系统（如火箭），F = dp/dt 仍正确但 F ≠ ma'
  sufficiency_conditions:
  - '[S] L = ½mv² − V(r) + Euler-Lagrange ⇒ F = dp/dt'
  reversible: true
- id: deriv.newton_first
  premise:
  - kernel.least_action
  - kernel.spacetime_dimensionality
  - law.euler_lagrange
  steps:
  - In the absence of external forces, V(r) = constant, so grad(V) = 0
  - Lagrangian reduces to L = (1/2)*m*v^2 (free particle)
  - Euler-Lagrange gives d(m*v)/dt = 0
  - Therefore v = constant -> uniform rectilinear motion
  conclusion: law.newton_first
  mathematical_link: grad(V) = 0 => d(m*v)/dt = 0 => v = const
  validity_scope:
  - classical_limit
  - inertial_frame
  sources:
  - Goldstein §1.1
  - Landau & Lifshitz §3
  necessity_conditions:
  - 'R2 (δS = 0) [N]: Euler-Lagrange 方程的来源'
  - 'R1: 惯性参考系的存在性 [N]: Newton 定律仅在惯性系成立'
  - 'm 为常数 [N]: dm/dt = 0（非相对论极限）'
  sufficiency_conditions:
  - '[S] 自由粒子 Lagrangian + Euler-Lagrange ⇒ Newton 第一定律'
  - 第一定律是第二定律在 F=0 的特殊情况
  reversible: true
- id: deriv.newton_third
  premise:
  - law.noether_theorem
  - kernel.spacetime_dimensionality
  steps:
  - Space-translation invariance of the action => momentum conservation via Noether's theorem
  - 'For two-body interaction: dP_total/dt = 0 => p1 + p2 = constant'
  - 'Differentiating: dp1/dt + dp2/dt = 0 => F12 + F21 = 0'
  - Therefore F_12 = -F_21 (equal magnitude, opposite direction)
  conclusion: law.newton_third
  mathematical_link: Space-translation symmetry -> d(m1*v1 + m2*v2)/dt = 0 -> F12 + F21 = 0
  validity_scope:
  - classical_limit
  - inertial_frame
  sources:
  - Goldstein §12.7
  - Noether (1918)
  necessity_conditions:
  - 动量守恒 [N]（来自 Noether + 空间平移对称性）
  - 系统孤立 [N]（无外力）
  sufficiency_conditions:
  - '[S] 动量守恒 + Newton 第二定律 ⇒ Newton 第三定律弱形式'
  - 注意：强形式（F₁₂ 和 r₁−r₂ 共线，即 collinear）仅在有心力下成立，在电磁学中破缺
  reversible: true
- id: deriv.newton_gravitation
  premise:
  - kernel.equivalence_principle
  - kernel.general_covariance
  - kernel.least_action
  - kernel.spacetime_dimensionality
  steps:
  - 'Start from Einstein field equations: G_munu = (8*pi*G/c^4)*T_munu'
  - 'Take weak-field limit: g_munu = eta_munu + h_munu with |h_munu| << 1'
  - 'Low-velocity limit: v << c'
  - 'Static field: time derivatives vanish'
  - 'The (0,0) component reduces to Poisson equation: del^2(phi) = 4*pi*G*rho'
  - 'Spherically symmetric solution: phi = -G*M/r'
  - 'Force on test particle: F = -m*grad(phi) = -G*m*M/r^2'
  conclusion: law.newton_gravitation
  mathematical_link: 'GR weak-field limit: G_00 = (8*pi*G/c^4)*T_00 => del^2(phi) = 4*pi*G*rho => F = -G*m*M/r^2'
  validity_scope:
  - weak_field_limit
  - non_relativistic_limit
  sources:
  - Weinberg Gravitation and Cosmology §3.1
  - Misner, Thorne & Wheeler §17.4
  necessity_conditions:
  - '弱场极限 [N]: |h_{μν}| ≪ 1'
  - '低速极限 [N]: v ≪ c'
  - '等效原理 [N]: m_i = m_g'
  - '静态场 [N]: ∂_t g_{μν} = 0'
  sufficiency_conditions:
  - '[S] Einstein 场方程 + 弱场低速极限 ⇒ Newton 万有引力'
  reversible: false
- id: deriv.maxwell_from_gauge
  premise:
  - kernel.gauge_interactions
  - kernel.least_action
  - kernel.lorentz_invariance
  - kernel.spacetime_dimensionality
  steps:
  - Define U(1) gauge field A_mu with field strength F_munu = partial_mu*A_nu - partial_nu*A_mu
  - 'Construct gauge-invariant Lagrangian: L = -(1/4)*F_munu*F^munu (Maxwell Lagrangian)'
  - Apply least action principle to Lagrangian + matter coupling term J^mu*A_mu
  - 'Varying A_mu yields Euler-Lagrange form: partial_mu*F^munu = J^nu'
  - 'The nu=0 component gives Gauss law: div(E) = rho_q'
  - 'The nu=1,2,3 components give Ampere-Maxwell law: curl(B) = J + partial(E)/partial(t)'
  - 'Bianchi identity on F_munu gives the homogeneous pair: div(B) = 0, curl(E) = -partial(B)/partial(t)'
  conclusion: law.ampere_maxwell
  mathematical_link: delta_S/delta_A_mu = 0 => partial_mu*F^munu = J^nu => div(E)=rho, curl(B)=J+E-dot
  validity_scope:
  - classical_limit
  sources:
  - Jackson §12.2
  - Peskin & Schroeder §15.1
  - Gross PNAS 93, 14256 (1996)
  necessity_conditions:
  - 'R3 (U(1) 规范不变性) [N]: 无规范原理 → 无 A_μ → 无 F_{μν} → 无 Maxwell 方程'
  - 'R2 (最小作用量) [N]: Euler-Lagrange 方程给出动力学 ∂_ν F^{νμ} = μ₀ J^μ'
  - 'R1 (Lorentz 不变性) [N]: Lagrangian −¼F_{μν}F^{μν} 必须是 Lorentz 标量；Bianchi 恒等式依赖时空的可微结构'
  - 'R1 (3+1 维) [N]: 电场 3 分量 + 磁场 3 分量 = 6（= F_{μν} 的独立分量数，来自 D(D−1)/2=6）'
  sufficiency_conditions:
  - '[S] U(1) gauge + R1 + R2 ⇒ Maxwell 方程组完备'
  - Maxwell 方程是 U(1) 规范理论在 3+1 维的唯一低能有效理论（无高阶导数项时）
  reversible: true
- id: deriv.lorentz_force
  premise:
  - kernel.gauge_interactions
  - kernel.spacetime_dimensionality
  steps:
  - 'Minimal coupling prescription: p_mu -> p_mu - q*A_mu in particle Lagrangian'
  - 'Classical particle Lagrangian with EM coupling: L = (1/2)*m*v^2 - q*phi + q*v·A'
  - 'Euler-Lagrange yields canonical momentum: p_can = m*v + q*A'
  - 'Force: F = dp_can/dt = -q*grad(phi) - q*partial(A)/partial(t) + q*v×curl(A)'
  - Recognizing E = -grad(phi) - partial(A)/partial(t) and B = curl(A)
  - Therefore F = q*(E + v×B)
  conclusion: law.lorentz_force
  mathematical_link: Euler-Lagrange + minimal coupling => F = q*(E + v×B)
  validity_scope:
  - classical_limit
  sources:
  - Jackson §12.1
  - Goldstein §1.5
  necessity_conditions:
  - 'R3 (最小耦合) [N]: p → p − qA 的替换来自规范不变性要求'
  - Euler-Lagrange 方程 [N]
  - E = −∇φ − ∂A/∂t 和 B = ∇×A 的定义 [N]
  sufficiency_conditions:
  - '[S] 最小耦合 Lagrangian + Euler-Lagrange ⇒ Lorentz 力'
  reversible: true
- id: deriv.gauss_electric
  premise:
  - kernel.gauge_interactions
  - kernel.least_action
  - kernel.lorentz_invariance
  - kernel.spacetime_dimensionality
  steps:
  - 'Maxwell Lagrangian: L = -(1/4)*F_munu*F^munu + J^mu*A_mu'
  - 'Euler-Lagrange for A_mu: partial_mu*F^munu = J^nu'
  - 'Take nu=0 component: partial_i*F^{i0} = J^0 = rho_q'
  - F^{i0} = -E^i, so -partial_i*E^i = rho_q
  - 'In vector notation: div(E) = rho_q/epsilon0'
  conclusion: law.gauss_electric
  mathematical_link: partial_mu*F^{mu 0} = J^0 => div(E) = rho_q/epsilon0
  validity_scope:
  - electrostatic_regime
  sources:
  - Jackson §12.2
  - Griffiths §2.2
  necessity_conditions:
  - 'U(1) 规范不变性 [N]: 定义 A_μ 和 F_{μν}'
  - '最小作用量 [N]: 给出 ∂_ν F^{νμ} = μ₀ J^μ'
  - '3+1 维 [N]: ∇·E 是三维散度，依赖空间维数 D=3'
  sufficiency_conditions:
  - '[S] ∂_ν F^{ν0} = μ₀ J⁰ + 场强分量对应 ⇒ ∇·E = ρ_q/ε₀'
  reversible: true
- id: deriv.gauss_magnetic
  premise:
  - kernel.gauge_interactions
  - kernel.spacetime_dimensionality
  steps:
  - F_munu = partial_mu*A_nu - partial_nu*A_mu (definition of field strength)
  - 'Bianchi identity: partial_lambda*F_munu + partial_mu*F_nulambda + partial_nu*F_lambdamu = 0'
  - Take spatial components only (lambda,mu,nu = 1,2,3)
  - partial_i*F_jk + partial_j*F_ki + partial_k*F_ij = 0
  - F_ij = epsilon_ijk*B^k, so partial_i*B^i = 0
  - 'In vector notation: div(B) = 0'
  conclusion: law.gauss_magnetic
  mathematical_link: F = dA => dF = 0 (Bianchi) => div(B) = 0
  validity_scope: []
  sources:
  - Jackson §5.7
  - Nakahara §10.1.2
  - Geometric identity from F = dA
  necessity_conditions:
  - 'F = dA (B = ∇×A) [N]: 磁场是无源场，因为它是矢势的旋度'
  - 'R3 [N]: A 本身来自规范补偿场要求'
  sufficiency_conditions:
  - '[S] B = ∇×A ⇒ ∇·B ≡ 0（恒等式，不需要任何动力学）'
  reversible: true
- id: deriv.faraday_induction
  premise:
  - kernel.gauge_interactions
  - kernel.spacetime_dimensionality
  steps:
  - 'Bianchi identity: partial_lambda*F_munu + partial_mu*F_nulambda + partial_nu*F_lambdamu = 0'
  - Take one time and two spatial indices (0,i,j)
  - partial_0*F_ij + partial_i*F_j0 + partial_j*F_0i = 0
  - F_ij = epsilon_ijk*B^k, F_i0 = E^i
  - partial(epsilon_ijk*B^k)/partial_t + partial_i*E_j - partial_j*E_i = 0
  - 'In vector notation: curl(E) = -partial(B)/partial(t)'
  conclusion: law.faraday_induction
  mathematical_link: dF = 0 (Bianchi) => curl(E) = -dB/dt
  validity_scope: []
  sources:
  - Jackson §5.15
  - Feynman II Ch.17
  - Geometric identity from F = dA
  necessity_conditions:
  - 'Bianchi 恒等式 [N]: ∂_0F_{ij}+∂_iF_{j0}+∂_jF_{0i}=0 ⇒ ∇×E = −∂B/∂t'
  - 'R3 [N]: F_{μν} = ∂_μ A_ν − ∂_ν A_μ'
  sufficiency_conditions:
  - '[S] F = dA + E,B 的场强对应 ⇒ ∇×E = −∂B/∂t'
  reversible: true
- id: deriv.schroedinger_equation
  premise:
  - kernel.operator_observable
  - kernel.unitary_evolution
  - kernel.canonical_commutation
  - kernel.spacetime_dimensionality
  steps:
  - 'Unitary evolution postulate: i*hbar*d|psi>/dt = H|psi>'
  - 'Position representation: |psi> -> psi(r) = <r|psi>'
  - Energy operator H = p^2/(2m) + V(r)
  - 'Momentum representation in position basis: p -> -i*hbar*grad (from [x,p] = i*hbar)'
  - Therefore H = -(hbar^2/(2m))*del^2 + V(r)
  - 'Yields: i*hbar*partial(psi)/partial(t) = [-(hbar^2/(2m))*del^2 + V(r)]*psi(r,t)'
  conclusion: law.schroedinger_equation
  mathematical_link: i*hbar*d/dt|psi> = H|psi>, p -> -i*hbar*grad => i*hbar*psi-dot = -(hbar^2/2m)*del^2(psi) + V*psi
  validity_scope:
  - quantum_regime
  - non_relativistic_limit
  sources:
  - Dirac Principles of QM §22
  - Feynman Lectures Vol.III Ch.16
  necessity_conditions:
  - 'R4b (幺正演化) [N]: iħ d|ψ⟩/dt = Ĥ|ψ⟩ 是量子动力学的源头'
  - 'R4c (正则对易 [x̂,p̂]=iħ) [N]: 确定动量算符的形式 p̂=−iħ∇。若 [x̂,p̂]=0 ⟹ 无量子效应'
  - 'R4d (算符对应) [N]: 经典 H → 算符 Ĥ 的升格规则'
  - 'R1 (时间坐标 t) [N]: 时间演化需要连续时间参数'
  sufficiency_conditions:
  - '[S] R4b + R4c + R4d + 经典 H(p,r) ⇒ Schrödinger 方程'
  - '注意: 这是非相对论极限。相对论推广需 Dirac 或 Klein-Gordon 方程 (R4+R1)'
  reversible: true
- id: deriv.uncertainty_principle
  premise:
  - kernel.canonical_commutation
  - kernel.born_rule
  - kernel.operator_observable
  - kernel.spacetime_dimensionality
  steps:
  - Start with [x, p] = i*hbar
  - 'Robertson-Schroedinger inequality: sigma_A*sigma_B >= |<[A,B]>|/2'
  - 'For A = x, B = p: sigma_x*sigma_p >= hbar/2'
  - Equality holds for Gaussian wave packets (coherent states — minimum uncertainty states)
  - 'Energy-time form: from [H, t] not well-defined (time is parameter, not operator); instead use d<A>/dt relation'
  - 'For energy: Delta_E*Delta_t >= hbar/2 (Mandelstam-Tamm bound)'
  conclusion: law.uncertainty_principle
  mathematical_link: '[x,p]=i*hbar -> sigma_x*sigma_p >= hbar/2 (Kennard 1927)'
  validity_scope:
  - quantum_regime
  sources:
  - Heisenberg Z.Phys. 43, 172 (1927)
  - Kennard Z.Phys. 44, 326 (1927)
  - Griffiths QM §3.5
  necessity_conditions:
  - 'R4c ([x̂,p̂]=iħ) [N]: 不确定性的源头是对易关系的非零性'
  - 'R5 (Born 规则) [N]: 方差 ⟨(Â−⟨Â⟩)²⟩ 的定义依赖概率解释'
  - 'R4d (厄米算符) [N]: Cauchy-Schwarz 不等式仅在厄米算符的内积语境中适用'
  sufficiency_conditions:
  - '[S] R4c + R4d + R5 ⇒ 不确定性原理'
  - '等号成立条件: Gaussian 波包（最小不确定态 = 相干态）'
  reversible: false
- id: deriv.energy_frequency
  premise:
  - kernel.canonical_commutation
  - kernel.least_action
  - kernel.spacetime_dimensionality
  - kernel.unitary_evolution
  - kernel.gauge_interactions
  steps:
  - 'Quantize the harmonic oscillator: H = p^2/(2m) + (1/2)*m*omega^2*x^2'
  - 'Define ladder operators: a = sqrt(m*omega/(2*hbar))*x + i*sqrt(1/(2*m*hbar*omega))*p'
  - From [x,p]=i*hbar -> [a, a-dagger] = 1
  - 'Hamiltonian: H = hbar*omega*(a-dagger*a + 1/2)'
  - 'Eigenvalues: E_n = hbar*omega*(n + 1/2) = h*nu*(n + 1/2)'
  - 'Photon energy quantum: E = h*nu'
  conclusion: law.energy_frequency
  mathematical_link: '[a, a-dagger]=1 => E_n = hbar*omega*(n+1/2) => E = h*nu'
  validity_scope:
  - quantum_regime
  sources:
  - Dirac Principles of QM §34
  - Griffiths QM §2.3
  necessity_conditions:
  - 'R4c ([x̂,p̂]=iħ) [N]: 没有对易关系就没有离散能谱'
  - '谐振子模型 [N]: 自由电磁场的每个模式是独立谐振子'
  sufficiency_conditions:
  - '[S] [x̂,p̂]=iħ + 谐振子 H ⇒ E_n = ħω(n+½) ⇒ E_photon = hν'
  reversible: true
- id: deriv.de_broglie_wavelength
  premise:
  - law.energy_frequency
  steps:
  - 'Photon: E = h*nu, p = E/c => p = h*nu/c = h/lambda'
  - Therefore lambda = h/p for photons
  - 'de Broglie hypothesis (1924): this relation holds for ALL matter, not just photons'
  - 'Experimental verification: Davisson-Germer (1927) electron diffraction'
  - The generalization is empirical — it is not logically forced by E=h*nu alone
  conclusion: law.de_broglie_wavelength
  mathematical_link: E=h*nu, p=E/c (photon) => lambda = h/p => generalized to all matter
  validity_scope:
  - quantum_regime
  sources:
  - de Broglie (1924)
  - Davisson & Germer (1927)
  - Eisberg & Resnick §3.1
  necessity_conditions:
  - 'E = hν [N]: 光子能量量子化是物质波假设的类比来源'
  - 'p 定义 [N]: 需要经典动量的明确定义'
  sufficiency_conditions:
  - '[S] E=hν + 光子类比 + 实验验证 ⇒ λ=h/p 对所有物质粒子成立'
  reversible: true
- id: deriv.energy_conservation
  premise:
  - law.noether_theorem
  - kernel.spacetime_dimensionality
  steps:
  - 'Time-translation symmetry of the action: S[q(t+epsilon)] = S[q(t)]'
  - 'Noether''s theorem: continuous symmetry -> conserved charge'
  - 'Generator of time translations: Hamiltonian H = p*dq/dt - L'
  - dH/dt = -(partial L / partial t)
  - 'If L has no explicit time dependence: dH/dt = 0'
  - Therefore energy E = H = constant for isolated systems
  conclusion: law.energy_conservation
  mathematical_link: dL/dt = 0 => dH/dt = 0 => E = constant
  validity_scope:
  - isolated_system
  - conservative_force
  sources:
  - Noether (1918)
  - Goldstein §12.7
  necessity_conditions:
  - Noether 定理 (law.noether_theorem)
  - '∂L/∂t = 0 [N]: 拉格朗日量不显含时间 — 若显含时间，能量不守恒'
  - 'R1 定义的时间坐标: 时间平移的数学基础'
  sufficiency_conditions:
  - '[S] ∂L/∂t = 0 + Noether ⇒ dE/dt = 0'
  reversible: true
- id: deriv.momentum_conservation
  premise:
  - law.noether_theorem
  - kernel.spacetime_dimensionality
  steps:
  - 'Space-translation symmetry: S[r+epsilon] = S[r] for uniform translation'
  - 'Noether charge for translations: P = dL/dr-dot = sum_i m_i*v_i'
  - dP/dt = sum_i d(m_i*v_i)/dt = sum_i F_i
  - 'For isolated system, zero net external force: dP/dt = 0'
  - Therefore total momentum P = constant
  conclusion: law.momentum_conservation
