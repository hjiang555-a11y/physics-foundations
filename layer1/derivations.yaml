  - rule.dimensional_consistency
  steps:
  - 'Gauss law in D spatial dimensions: flux through (D-1)-sphere ∝ r^(D-1)'
  - 'Force = gradient of potential: F ∝ 1/r^(D-1)'
  - D=3 => F ∝ 1/r^2
  conclusion: contingent.inverse_square_law
  mathematical_link: D=3 => flux ∝ r^2 => F ∝ 1/r^2
  validity_scope:
  - classical_limit
  sources:
