  - 'D=4 时 ⌊D/2⌋=2, 但 L₂ (Gauss-Bonnet) 的变分在 4D 中恒为零 (拓扑不变量, Chern-Gauss-Bonnet 定理) → 不贡献运动方程'
  - '因此在 4D 中唯一产生二阶场方程的纯度规 Lagrange 密度为: L_grav = c₀ + c₁ R = −2Λ + R/(2κ) (其中 c₀ 重定义为 Λ, c₁ 重定义为 1/(2κ))'
