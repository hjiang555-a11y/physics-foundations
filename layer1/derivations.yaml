  - kernel.general_covariance
  steps:
  - 'Linearized GR: g_munu = eta_munu + h_munu'
  - Gauge-fixing reduces 10 components of h_munu to 6 physical
  - 'D=4 spacetime: TT gauge leaves D(D-3)/2 = 2 independent components'
  - These are the h_+ and h_x (plus and cross) polarizations of gravitational waves
  conclusion: contingent.gw_polarizations
  mathematical_link: D=4 => D(D-3)/2 = 2 => helicity +/-2 GW polarizations
  validity_scope:
