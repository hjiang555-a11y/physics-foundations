  steps:
  - 'Weak third law: S → 0 as T → 0 (non-degenerate ground state, entropy of perfect crystal vanishes at absolute zero)'
  - 'Consider cooling process: to lower temperature, system must undergo adiabatic (isentropic) and isothermal steps'
  - 'For an adiabatic step: ΔS_ad = 0. For an isothermal step at temperature T: ΔS_iso = ΔQ_rev / T'
  - 'Heat capacity constraint: as T→0, C(T) → 0. Debye model: C(T) ∝ T³; electron contribution: C(T) ∝ T'
  - 'Entropy change for cooling from T_i to T_f: ΔS = ∫_{T_i}^{T_f} C(T)/T dT. For T_f > 0, this integral is finite'
  - 'Reaching T=0 requires removing the last entropy increment ΔS(T→0) = S(T) − S(0)'
  - 'In any finite isothermal step at temperature T, the entropy reduction is ΔS_step ≤ C(T)/T · ΔT'
  - 'As T→0, both C(T)→0 and the Carnot efficiency η = 1−T_cold/T_hot → 1, but each step removes only an infinitesimal amount of entropy'
  - 'Number of finite steps required diverges: N ∝ 1/T_final → ∞ as T_final → 0 → T=0 cannot be reached in finite steps'
  - 'Cross-ref M1: spin-statistics determines actual ground state degeneracy g₀ — if g₀>1, S→k_B ln g₀ > 0, Nernst theorem modified'
  conclusion: cor.nernst_unattainability
  mathematical_link: S→0 as T→0 + ΔS = ∫C(T)/T dT finite + each step removes finite ΔS ⇒ infinite steps needed to reach T=0
  validity_scope:
  - zero_temperature_limit
  - macroscopic_limit
  sources:
