  - Barrow & Tipler §4.8
  reversible: false
- id: deriv.huygens_principle
  premise:
  - kernel.spacetime_dimensionality
  steps:
  - 'Wave equation in D spatial dimensions: (del^2 - (1/c^2)*partial^2/partial_t^2)*phi
    = 0'
  - 'Green function: G(r,t) ∝ delta(t - r/c) for D=3 (odd) -> sharp wavefront'
  - 'For even D: G(r,t) has tail -> signal smears, echoes follow main pulse'
  - D=3 (odd) is necessary for clean signal propagation (Huygens principle)
  conclusion: contingent.huygens_principle
  mathematical_link: D=3 (odd) => Green function has sharp delta-function wavefront
    => Huygens principle holds
  validity_scope:
  - vacuum
  sources:
  - Hadamard (1923)
  - Courant & Hilbert §VI.12
  - Baker & Copson (1939)
  reversible: false
