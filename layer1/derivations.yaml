  reversible: false
- id: deriv.so3_rotation_group
  premise:
  - kernel.spacetime_dimensionality
  steps:
  - In D spatial dimensions, rotation group is SO(D) with D(D-1)/2 generators
  - 'D=3 => SO(3) with 3 generators: L_x, L_y, L_z'
  - The Lie algebra so(3) has commutation [L_i, L_j] = i*epsilon_ijk*L_k
  - 'Angular momentum quantization: L_z = m_l*hbar with (2l+1) eigenstates'
  conclusion: contingent.so3_rotation_group
  mathematical_link: D=3 => dim(SO(3)) = 3 => angular momentum has 3 components
  validity_scope: []
  sources:
