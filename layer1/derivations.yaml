- id: deriv.stable_kepler_orbits
  premise:
  - kernel.spacetime_dimensionality
  steps:
  - 'Effective potential: V_eff = -k/r^(D-2) + L^2/(2*m*r^2)'
  - 'For D>3: the centrifugal barrier L^2/r^2 dominates at small r less strongly than
    1/r^(D-2)'
  - 'Result: no stable minimum in V_eff for D>3'
  - D=3 is the only dimension where stable closed orbits exist
  conclusion: contingent.stable_kepler_orbits
  mathematical_link: V_eff = -k/r^(D-2) + L^2/(2mr^2) => stable minimum only for D=3
  validity_scope:
  - classical_limit
  - conservative_force
