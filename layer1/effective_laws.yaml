effective_laws:
- id: law.euler_lagrange
  relation: 'The condition δS = 0 yields the Euler-Lagrange equation: d/dt(∂L/∂q̇)
    − ∂L/∂q = 0. This is a mathematical identity of the calculus of variations, not
    a physical axiom. It bridges kernel.least_action to all of classical mechanics.

    '
  quantities:
  - qty.action
  scope:
  - classical_limit
  - conservative_force
  provenance: Euler (1744); Lagrange (1788); Goldstein §2.1
  hardness: hard
  layer: effective_law
  derived_from:
  - kernel.least_action
  - kernel.spacetime_dimensionality
- id: law.noether_theorem
  relation: >
    Every continuous symmetry of the action corresponds to a conserved current.
    Time translation yields energy conservation; space translation yields momentum
    conservation; rotation yields angular momentum conservation; gauge symmetry
    yields charge conservation when the corresponding local gauge premise is present.
  quantities:
  - qty.action
  - qty.energy
  - qty.momentum
  - qty.angular_momentum
  - qty.electric_charge
  scope: []
  provenance: Noether (1918); Goldstein §12.7; Gross PNAS 93, 14256 (1996)
  hardness: hard
  layer: effective_law
  derived_from:
  - kernel.least_action
  - kernel.spacetime_dimensionality
- id: law.newton_first
  relation: 'In the absence of net external force, an object maintains its state of
    uniform motion: F = 0 → dv/dt = 0.

    '
  quantities:
  - qty.force
  - qty.velocity
  - qty.time
  scope:
  - inertial_frame
  - classical_limit
  provenance: Newton Principia Book I; Goldstein §1.1
  hardness: hard
  layer: effective_law
  derived_from:
  - kernel.least_action
  - kernel.spacetime_dimensionality
- id: law.newton_second
  relation: 'The net force on an object equals the rate of change of its momentum:
    F = dp/dt. For constant mass: F = m·a.

    '
  quantities:
  - qty.force
  - qty.momentum
  - qty.mass
  - qty.acceleration
  - qty.time
  scope:
  - inertial_frame
  - classical_limit
  provenance: Newton Principia Book I; Goldstein §1.1
  hardness: hard
  layer: effective_law
  derived_from:
  - kernel.least_action
  - law.euler_lagrange
  - kernel.spacetime_dimensionality
- id: law.newton_third
  relation: 'F₁₂ = −F₂₁. Weak form (equal opposite) universal; strong form (collinear)
    fails in EM.

    '
  quantities:
  - qty.force
  - qty.momentum
  scope:
  - inertial_frame
  - classical_limit
  provenance: Follows from momentum conservation (space-translation symmetry → Noether)
  hardness: hard
  layer: effective_law
  derived_from:
  - law.noether_theorem
  - kernel.spacetime_dimensionality
- id: law.newton_gravitation
  relation: F₁₂ = −(G·m₁·m₂/r²)·r̂
  quantities:
  - qty.force
  - qty.gravitational_mass
  - cst.gravitational
  - qty.length
  scope:
  - classical_limit
  - weak_field_limit
  - point_particle_approximation
  provenance: Newton Principia Book III; GR weak-field, low-velocity limit
  hardness: hard
  layer: effective_law
  derived_from:
  - kernel.equivalence_principle
  - kernel.general_covariance
  - kernel.spacetime_dimensionality
- id: law.gauss_electric
  relation: ∇·E = ρ_q / ε₀
  quantities:
  - qty.electric_field
  - qty.charge_density
  - cst.vacuum_permittivity
  scope:
  - electrostatic_regime
  provenance: Maxwell (1861-62); Derivable from U(1) gauge symmetry + least action
    + Lorentz invariance
  hardness: hard
  layer: effective_law
  derived_from:
  - kernel.gauge_interactions
  - kernel.least_action
  - kernel.lorentz_invariance
  - kernel.spacetime_dimensionality
- id: law.gauss_magnetic
  relation: ∇·B = 0
  quantities:
  - qty.magnetic_field
  scope: []
  provenance: Maxwell; Geometric necessity from F_μν = ∂_μ A_ν − ∂_ν A_μ
  hardness: hard
  layer: effective_law
  derived_from:
  - kernel.gauge_interactions
  - kernel.spacetime_dimensionality
- id: law.faraday_induction
  relation: ∇×E = −∂B/∂t
  quantities:
  - qty.electric_field
  - qty.magnetic_field
  - qty.time
  scope: []
  provenance: Faraday (1831); Maxwell (1861-62); Feynman II Ch.17
  hardness: hard
  layer: effective_law
  derived_from:
  - kernel.gauge_interactions
  - kernel.spacetime_dimensionality
- id: law.ampere_maxwell
  relation: ∇×B = μ₀·J + μ₀·ε₀·∂E/∂t
