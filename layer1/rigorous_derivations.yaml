    mathematical_link: "D=4 ⇒ D(D−3)/2 = 2 ⇒ helicity ±2 GW polarizations"

  # ═══════════════════════════════════════════════════════════════
  # G10: Nernst Unattainability (Third Law Strong Form)
  # ═══════════════════════════════════════════════════════════════

  - id: deriv.nernst_unattainability
    conclusion: cor.nernst_unattainability
    conclusion_statement: >
      T=0 is unattainable in any finite sequence of thermodynamic operations.
      This is the strong form of Nernst's heat theorem.
    premise:
      - law.third_law_thermo
      - kernel.boltzmann_entropy
      - kernel.equal_prior_probability

    variables:
      - { symbol: "T", type: "ℝ₊", dim: "[Θ]", domain: "T ≥ 0", meaning: "热力学温度" }
      - { symbol: "S", type: "ℝ₊", dim: "[M·L²·T⁻²·Θ⁻¹]", domain: "S ≥ 0", meaning: "熵; 状态函数" }
      - { symbol: "C(T)", type: "ℝ → ℝ₊", dim: "[M·L²·T⁻²·Θ⁻¹]", domain: "C(T) ≥ 0", meaning: "热容; 在 T→0 时 C(T)→0" }
      - { symbol: "ΔS_step", type: "ℝ", dim: "[M·L²·T⁻²·Θ⁻¹]", domain: "", meaning: "每一步有限操作中的熵变化" }
      - { symbol: "N", type: "ℕ", dim: "[1]", domain: "N ∈ ℕ", meaning: "逼近 T=0 所需的有限步骤数" }

    steps:
      - step: 1
        description: "第三定律弱形式 (前提)"
        expression: "S → 0 as T → 0（非简并基态, 完美晶体）"
        justification: >
          law.third_law_thermo: 在 T→0 时, 系统占据其量子基态。
          若基态非简并 g₀=1: S → k_B ln(1) = 0。
          若基态简并 g₀>1: S → k_B ln(g₀) > 0 (残余熵)。
          此处先假设非简并基态; 简并情况在 Step 7 讨论。
        condition: "[N] 离散量子能谱 (来自 law.schroedinger_equation + R4)"

      - step: 2
        description: "冷却过程中的熵变"
        expression: "dS = δQ_rev / T = C(T) dT / T"
        justification: >
          对可逆过程, 熵变 = 可逆热 / 温度。C(T) ≡ δQ_rev/dT 为热容。
          任何冷却过程 (即使不可逆) 的净熵变 ≤ 可逆熵变: ΔS ≥ ∫ C(T)/T dT。
        condition: "[N] 热容 C(T) 有定义 (T 是良好定义的状态变量)"

      - step: 3
        description: "低温热容行为 (量子效应)"
        expression: "C(T) → 0 as T → 0（C(T) ∝ T³ 声子, C(T) ∝ T 电子）"
        justification: >
          量子力学要求低温热容趋于零 (经典 Dulong-Petit C=3R 在 T→0 时失效)。
          Debye 模型: 声子热容 C_ph ∝ T³。
          自由电子气: C_el = γT (γ 为 Sommerfeld 常数)。
          这是第三定律的微观基础 — 若无量子力学, 经典热容非零 ⇒ S_diverges。
        condition: "[N] 低温下声子和电子遵从量子统计 (M1: spin-statistics → Fermi-Dirac for electrons, Bose-Einstein for phonons)"

      - step: 4
        description: "从 T_i 冷却到 T_f 的总熵变"
        expression: "ΔS(T_i → T_f) = ∫_{T_i}^{T_f} C(T)/T dT"
        justification: >
          积分 Step 2 中的微分关系。由于 C(T)→0 as T→0, 被积函数 C(T)/T
          在 T→0 时趋向有限值 (C∝T ⇒ C/T ∝ T⁰)。积分收敛:
          ΔS(0→T) = O(T³) (声子) + O(T) (电子) → 有限值。
          这意味着从 T>0 到 T=0 的总熵变是有限的。

      - step: 5
        description: "每一步有限操作仅能移除有限熵"
        expression: "|ΔS_step| ≤ ΔS_max(T) < ∞"
        justification: >
          在任意有限的热力学操作 (等温压缩、绝热膨胀/退磁等) 中,
          系统可实现的熵变受限于热容和温变幅度。
          在温度 T 时, 等温操作的最大熵变: |ΔS_iso| ≤ C(T)。
          随着 T→0, C(T)→0, 每一步等温操作能移除的熵趋于零。
          这意味着越接近 T=0, 每一步越"无能"。

      - step: 6
        description: "步数发散 → T=0 不可达"
        expression: "N · |ΔS_step(T)| ≥ ΔS(T→0) ⇒ N → ∞ as T→0"
        justification: >
          要从初始温度 T_i 冷却到目标温度 T_f, 需要的总熵移除量 = S(T_i) − S(T_f)。
          由于每步只能移除有限熵且 |ΔS_step| → 0 当 T→0,
          所需步数 N ∝ [S(T_i) − S(T_f)] / |ΔS_step(T_f)| → ∞ 当 T_f → 0。
          因此 T=0 在有限步内不可达。等价地: 任何从 T>0 开始的有限步操作
          序列只能到达某个有限的 T_min > 0。

      - step: 7
        description: "基态简并度的影响 (Cross-ref M1)"
        expression: "若 g₀ > 1: S(T→0) = k_B ln(g₀) > 0"
        justification: >
          自旋-统计定理 (M1) 决定基态的简并结构:
          - 费米子: Pauli 原理 → 每个量子态最多一个粒子 → 基态通常非简并或低简并
          - 玻色子: 无 Pauli 约束 → 可能存在更大简并度
          若 g₀ > 1 (如自旋冰、阻挫磁体), 残余熵 S₀ = k_B ln(g₀) > 0。
          Nernst 不可达性在此情况下仍然成立 — 只是目标不是 S=0 而是 S₀。
          达此残余熵仍需要无限步, 因为每步熵移除量仍随 T→0 趋于零。
        cross_references:
          - "M1: spin-statistics → ground state degeneracy g₀ — Pauli exclusion for fermions, Bose symmetry for bosons"

    result: "T=0 在任意有限步操作中不可达 (Nernst 不可达性原理)"

    necessity_conditions:
      - "第三定律弱形式 [N]: S→0 as T→0 — 无此前提, T=0 的不可达性论证失去起点"
      - "R6 (S = k_B ln W + 等概率) [N]: 熵的统计定义 — 连接微观与宏观"
      - "C(T)→0 as T→0 [N]: 量子效应 (声子、电子) 导致的热容低温标度律 — 无量子力学则 C(T) 非零 → 论证失效"
      - "有限步骤约束 [N]: 每一步仅能移除有限熵 — 若无此约束, 可以构造一个连续过程直接到 T=0"
      - "M1 (自旋-统计) [N]: 决定基态简并度 g₀ → 决定残余熵 S(T→0) 的实际值"

    sufficiency_conditions:
      - "[S] 第三定律弱形式 + C(T)→0 as T→0 + 有限步骤约束 ⇒ T=0 不可达"
      - "Nernst 不可达性是第三定律的强形式 — 它提供比 S→0 as T→0 更强的物理约束"
      - "注: 强形式在黑洞热力学中可能破缺 — 黑洞有非零 Hawking 温度且不能通过任何过程达到 T=0"

    reversible: false
    reverse_note: "T=0 不可达 ⇏ 第三定律弱形式 (S→0 as T→0) — 可能存在 S→0 但 T=0 可达的世界 (尽管未发现)"

    validity_scope:
      - zero_temperature_limit
      - macroscopic_limit
    mathematical_link: "S→0 as T→0 + ΔS = ∫C(T)/T dT finite + each step removes finite ΔS ⇒ infinite steps needed to reach T=0"

  # ═══════════════════════════════════════════════════════════════
  # G11: Standard Model Effective Field Theory
  # ═══════════════════════════════════════════════════════════════

  - id: deriv.asymptotic_freedom
    conclusion: cor.asymptotic_freedom
    conclusion_statement: >
      In QCD (SU(3)_C non-Abelian gauge theory), the coupling constant
      α_s(μ) decreases logarithmically as energy scale μ increases —
      asymptotic freedom. The β-function is negative for N_c=3, n_f≤16.
    premise:
      - contingent.sm_gauge_group
      - kernel.gauge_interactions
      - kernel.spacetime_dimensionality

    variables:
      - { symbol: "g", type: "ℝ⁺", dim: "[1]", domain: "g = g(μ)", meaning: "SU(3)_C 跑动规范耦合常数" }
      - { symbol: "α_s(μ)", type: "ℝ⁺", dim: "[1]", domain: "α_s ≡ g²/(4π)", meaning: "QCD 精细结构常数 (标度依赖)" }
      - { symbol: "μ", type: "ℝ⁺", dim: "[M]", domain: "μ > 0", meaning: "重整化标度 (能量尺度)" }
      - { symbol: "β(g)", type: "ℝ → ℝ", dim: "[1]", domain: "", meaning: "β-函数: β(g) = ∂g/∂ln μ" }
      - { symbol: "β₀", type: "ℝ", dim: "[1]", domain: "β₀ = 11N_c/3 − 2n_f/3", meaning: "单圈 β-函数系数" }
      - { symbol: "N_c", type: "ℕ⁺", dim: "[1]", domain: "N_c = 3 (QCD)", meaning: "颜色的数量" }
      - { symbol: "n_f", type: "ℕ", dim: "[1]", domain: "n_f = 6 (SM 夸克味数)", meaning: "在标度 μ 处活跃的夸克味数" }
      - { symbol: "Λ_QCD", type: "常数", dim: "[M]", domain: "Λ_QCD ≈ 200 MeV", meaning: "QCD 标度 (α_s 发散的标度)" }
      - { symbol: "f^{abc}", type: "ℝ^{8×8×8}", dim: "[1]", domain: "全反对称", meaning: "SU(3) 结构常数; 胶子自相互作用顶点" }

    steps:
      - step: 1
        description: "QCD = SU(3)_C Yang-Mills 理论 (来自 SM 规范群)"
        expression: "L_QCD = −¼ G^a_{μν} G^{aμν} + Σ_f ψ̄_f (iγ^μ D_μ − m_f) ψ_f"
        justification: >
          contingent.sm_gauge_group 的 QCD 部分: SU(3)_C。
          这是非 Abel 规范理论 (Yang-Mills)。G^a_{μν} = ∂_μ A^a_ν − ∂_ν A^a_μ + g f^{abc} A^b_μ A^c_ν。
          与 Abelian QED (U(1)) 的关键区别: 胶子场强 G^a_{μν} 包含 g f^{abc} 项 — 胶子自耦合。
        condition: "[N] R3: 规范不变性定义 A^a_μ 的存在性和协变导数 D_μ = ∂_μ − ig T^a A^a_μ"

      - step: 2
        description: "重整化群方程 (Callan-Symanzik)"
        expression: "[μ ∂/∂μ + β(g) ∂/∂g] G^{(n)}(p_i; g, μ) = 0"
        justification: >
          重整化群描述物理量如何随标度 μ 变化 (同时调整耦合 g(μ) 以保持裸理论不变)。
          β(g) ≡ ∂g/∂ln μ 编码耦合常数对标度的依赖。
        condition: "[N] 重整化程序合法 (可重整理论)"
        reference: "Peskin & Schroeder §12.2-12.3"

      - step: 3
        description: "单圈 β-函数计算 (Gross-Wilczek, Politzer 1973)"
        expression: "β(g) = −g³/(16π²) · β₀ + O(g⁵),  β₀ = 11N_c/3 − 2n_f/3"
        justification: >
          非 Abel 规范理论的计算涉及三部分贡献:
          (a) 胶子自能图 (gluon loop): 贡献 +11N_c/3 (反屏蔽)
          (b) 费米子圈 (quark loop): 贡献 −2n_f/3 (屏蔽, 与 QED 同)
          (c) 鬼粒子圈 (Faddeev-Popov ghost): 已包含在 (a) 中
          总 β₀ = 11N_c/3 − 2n_f/3。
          Abel 理论 (QED, N_c=0 等效): β₀_QED = −2n_f/3 < 0 ⇒ 屏蔽 (耦合随能量增长)。
        condition: "[N] 单圈微扰论有效 (g ≪ 1, α_s ≪ 1 — 高能标度)"
        reference: "Gross & Wilczek, PRL 30, 1343 (1973); Politzer, PRL 30, 1346 (1973)"

      - step: 4
        description: "QCD 的 β₀ 符号"
        expression: "QCD: N_c=3, n_f=6 ⇒ β₀ = 11·3/3 − 2·6/3 = 11 − 4 = 7 > 0"
        justification: >
          β₀ > 0 ⇒ β(g) < 0 (对 g > 0) ⇒ 耦合常数 g 随 μ 增大而减小。
          若 n_f 过大 (≥ 17 对 N_c=3), β₀ < 0 → 渐近自由丧失 → 理论在高能处成为强耦合 (像 QED)。
          SM 的 n_f=6 保证了 QCD 的渐近自由。
        condition: "[N] N_c=3 和 n_f=6 均为 contingent 事实 — 若不同, 结论改变"

      - step: 5
        description: "求解 RG 方程 → 对数跑动"
        expression: "α_s(μ) = g²/(4π) = 2π/(β₀ ln(μ/Λ_QCD))"
        justification: >
          单圈 RG 方程: dα_s/d ln μ = −β₀ α_s²/(2π)。积分得:
          1/α_s(μ) − 1/α_s(μ₀) = (β₀/(2π)) ln(μ/μ₀)。
          定义 Λ_QCD = μ₀ exp(−2π/(β₀ α_s(μ₀))) → α_s(μ) = 2π/[β₀ ln(μ/Λ_QCD)]。
          α_s 随 μ 对数减小 — "渐近自由"。
        condition: "[N] μ ≫ Λ_QCD (微扰域)"

      - step: 6
        description: "渐近自由的物理后果"
        expression: "α_s → 0 as μ → ∞ (短距离, 高能); α_s → ∞ as μ → Λ_QCD (长距离, 低能 → 禁闭)"
        justification: >
          在高能 (短距离) 极限: 夸克和胶子几乎自由 (渐近自由) → 深非弹散射的 Bjorken 标度律。
          在低能 (长距离) 极限: α_s ≳ 1 → 微扰论失效 → 夸克禁闭在强子内, 形成色单态。
          Λ_QCD ≈ 200 MeV 是 QCD 的自然标度 — 分隔微扰和非微扰域。
        cross_references:
          - "M2: Lovelock uniqueness — same 'symmetry + dimension → unique theory' methodology"

    result: "α_s(μ) ∝ 1/ln(μ/Λ_QCD) → 0 as μ→∞ (渐近自由)"

    necessity_conditions:
      - "SU(3)_C 非 Abel 规范群 [N]: 胶子自相互作用 (f^{abc} 项) 是反屏蔽的必要条件"
      - "R3 (规范不变性) [N]: 定义耦合和 RG 流的基础框架"
