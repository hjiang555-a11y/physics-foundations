      - "广义协变性 (kernel.general_covariance): 规范自由度将 10 个 h_{μν} 分量缩减至 6 个物理分量"
      - "线性化 GR 有效: 弱场近似 h_{μν} ≪ 1 是 TT 规范的前提"

    sufficiency_conditions:
