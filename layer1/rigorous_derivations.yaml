    steps:
      - step: 1
        description: "微因果性 (Microcausality)"
        expression: "对类空间隔 (x−y)² < 0: [φ(x), φ(y)]_± = 0"
        justification: >
          R1 (Lorentz 不变性 + 因果结构) 要求类空分离的场算符满足
          (反)对易关系。两个类空分离的测量不能互相影响，故对应的
          可观测量的算符必须 (反)对易。这是自旋-统计定理的核心输入。

      - step: 2
        description: "自旋-统计连接 (Spin-Statistics Theorem)"
        expression: >
          Fierz (1939) — Pauli (1940) — Lüders & Zumino (1958):
          在满足 Lorentz 不变性 + 谱条件 (正能量) + 微观因果性的
          量子场论中，整数自旋场必须对易 (Bose 统计)，半整数自旋场
          必须反对易 (Fermi 统计)。
        justification: >
          这是量子场论中最深的结构定理。严格证明依赖 Wightman 公理体系
          (正定度量、谱条件、局域性、Lorentz 协变性) 或 LSZ 约化公式 +
          CPT 定理 + 自旋表示论。此处为结论性引用，不重构完整证明。
          详见 Streater & Wightman "PCT, Spin & Statistics, and All That" (1964)。

      - step: 3
        description: "费米子场的反对易性"
        expression: "对半整数自旋 s: {φ(x), φ(y)} = 0 当 (x−y)² < 0"
        justification: "Step 2 的直接结论。费米子场算符在类空间隔下反对易。"

      - step: 4
        description: "多粒子波函数的反对称性"
        expression: "从场算符的反对易关系 ⇒ 多粒子态波函数在交换下反号"
        justification: >
          多粒子态 |r₁,s₁; r₂,s₂⟩ ∝ φ†(r₁,s₁)·φ†(r₂,s₂)|0⟩。
          场算符的反对易性继承到波函数:
          ψ(r₁,s₁; r₂,s₂) = ⟨0|φ(r₂,s₂)φ(r₁,s₁)|ψ⟩
          = −⟨0|φ(r₁,s₁)φ(r₂,s₂)|ψ⟩ = −ψ(r₂,s₂; r₁,s₁)。

      - step: 5
        description: "Pauli 不相容原理"
        expression: "ψ(…, r_i, s_i; …, r_i, s_i; …) = 0"
        justification: >
          反对称波函数在交换两个全同粒子时变号。
          若两粒子占据同一量子态 (r,s 全同)，交换后波函数不变 (因全同)，
          但反对称性要求变号: ψ = −ψ ⇒ ψ = 0。
          此即 Pauli 不相容原理: 无两个全同费米子可占据同一量子态。

    result: >
      自旋-统计定理 ⇒ 费米子波函数完全反对称 ⇒ Pauli 不相容原理。
      此推导是结构性大纲；自旋-统计定理的完整严格证明 (需 Wightman 公理、
      CPT 定理、自旋群表示限制) 超出本项目范围。

    caveat: >
      上述步骤为结构性逻辑大纲。自旋-统计定理的完整数学推导需
      Wightman 公理体系 (Streater & Wightman 1964) 或 Weinberg
      (1995, Vol. I Ch. 5) 的 LSZ-微因果性方法。本推导给出的是
      从 R1 (微因果性) + R4 (量子结构) 到结论的逻辑链，不声称
      提供了 axoimatic QFT 层面的完整严格性。

    necessity_conditions:
      - "R1 (Lorentz 不变性 + 微观因果性) [N]: Step 1 的核心前提"
      - "R4a (叠加原理) [N]: Hilbert 空间正定度量为 Wightman 公理的前提"
      - "R4b (幺正演化) [N]: 谱条件 (正能量) 依赖幺正表示"
      - "3+1 维时空 [N]: 自旋-统计定理在 D≠4 时可给出不同结论 (如 anyon)"
      - "半整数自旋 [N]: 仅对费米子成立；整数自旋 ⇒ Bose 统计"

    sufficiency_conditions:
      - "[S] Lorentz 不变性 + 量子公设 + 微观因果性 ⇒ 自旋-统计定理 (费米子侧)"

    reversible: false
    reverse_note: "Pauli 不相容 ⇏ 自旋-统计定理的完整结构 (Bose 侧 + CPT)"
    validity_scope:
      - quantum_regime
      - relativistic_regime
    mathematical_link: "Lorentz + microcausality → spin-statistics → antisymmetric ψ → Pauli exclusion"

  - id: deriv.fermi_dirac_distribution
    conclusion: cor.fermi_dirac
    conclusion_statement: "f(E) = 1/[exp((E−μ)/(k_B T)) + 1]"
    premise:
      - law.pauli_exclusion
      - kernel.boltzmann_entropy

    variables:
      - { symbol: "f(E)", type: "ℝ_{[0,1]}", dim: "[1]", domain: "0 ≤ f ≤ 1", meaning: "能级 E 的平均占据数" }
      - { symbol: "n_i", type: "{0,1}", dim: "[1]", domain: "0 or 1", meaning: "第 i 个单粒子态的占据数（Pauli: ≤1）" }
      - { symbol: "β", type: "ℝ⁺", dim: "[M⁻¹·L⁻²·T²]", domain: "β = 1/(k_B T)", meaning: "逆温度" }

    steps:
      - step: 1
        description: "Fermi 子约束: n_i ∈ {0,1}"
        expression: ""
        justification: "law.pauli_exclusion (自旋-统计定理，← R1+R4): 每个单粒子量子态至多被一个费米子占据。"

      - step: 2
        description: "巨正则系综中最大化熵"
        expression: "S = −k_B Σ_i [n_i ln n_i + (1−n_i) ln(1−n_i)]"
        justification: >
          给定 {0,1} 约束，每个态的统计权重 = (1 choose n_i) = 1。
          约束: Σ_i n_i = N (粒子数), Σ_i n_i E_i = E (能量)。
        condition: "[N] R6: S = k_B ln W，其中 W = 1（每个态只有 {0,1} 两种可能）"

      - step: 3
        description: "用 Lagrange 乘子最大化 ln W"
        expression: "∂/∂n_i [−Σ_i (n_i ln n_i + (1−n_i) ln(1−n_i)) − αΣ_i n_i − βΣ_i n_i E_i] = 0"
        justification: "α 约束 N, β 约束 E。"

      - step: 4
        description: "求解得 Fermi-Dirac 分布"
        expression: "ln[(1−n_i)/n_i] = α + βE_i ⇒ n_i = 1/[exp(α+βE_i) + 1]"
        justification: "令 α = −βμ, β = 1/(k_B T) 得标准形式。"

    result: "f(E) = 1/[exp((E−μ)/(k_B T)) + 1]"

    necessity_conditions:
      - "Pauli 不相容 [N]: n_i ∈ {0,1}。若无此约束，分布退化为 Maxwell-Boltzmann"
      - "R6 [N]: 熵最大化的统计方法"
      - "热平衡 [N]: T 的统一定义"

    sufficiency_conditions:
      - "[S] Pauli + R6 + 热平衡 ⇒ Fermi-Dirac 分布"

    reversible: true
    validity_scope:
      - thermal_equilibrium
      - quantum_regime
    mathematical_link: "n_i∈{0,1} → maximize S → f(E)=1/(exp(β(E−μ))+1)"

  - id: deriv.bose_einstein_distribution
    conclusion: cor.bose_einstein
    conclusion_statement: "f(E) = 1/[exp((E−μ)/(k_B T)) − 1]"
    premise:
      - kernel.superposition_principle
      - kernel.boltzmann_entropy

    variables:
      - { symbol: "n_i", type: "ℕ", dim: "[1]", domain: "n_i ∈ {0,1,2,…}", meaning: "第 i 个单粒子态的占据数（无上限）" }

    steps:
      - step: 1
        description: "Bose 子约束: n_i ∈ {0,1,2,…}（无上限）"
        expression: ""
        justification: "R4a (叠加原理): Bose 子可以任意数量占据同一量子态。"

      - step: 2
        description: "最大化熵"
        expression: "S = k_B Σ_i [(1+n_i) ln(1+n_i) − n_i ln n_i]"
        justification: >
          每个单粒子态被 n_i 个全同 Bose 子占据的组合数:
          W_i = (n_i+g_i−1)!/(n_i!(g_i−1)!) → 对 g_i=1（单态）W_i=1。
          但 Bose 子的交换对称性改变了状态计数方式。
        condition: "[N] R6"

      - step: 3
        description: "求解得 Bose-Einstein 分布"
        expression: "n_i = 1/[exp(α+βE_i) − 1] → f(E) = 1/[exp((E−μ)/(k_B T)) − 1]"
        justification: "α = −βμ, β = 1/(k_B T)"

    result: "f(E) = 1/[exp((E−μ)/(k_B T)) − 1]"

    necessity_conditions:
      - "叠加原理 [N]: n_i 无上限约束"
      - "R6 [N]"

    sufficiency_conditions:
      - "[S] 叠加原理 + R6 + 热平衡 ⇒ Bose-Einstein 分布"
      - "分母中的 −1 ⇒ 当 μ→0 时 f 发散 ⇒ Bose-Einstein 凝聚"

    reversible: true
    validity_scope:
      - thermal_equilibrium
      - quantum_regime
    mathematical_link: "n_i∈{0,1,2,…} → maximize S → f(E)=1/(exp(β(E−μ))−1)"
