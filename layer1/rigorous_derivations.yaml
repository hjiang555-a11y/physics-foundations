  - id: deriv.pauli_exclusion
    conclusion: law.pauli_exclusion
    conclusion_statement: >
      半整数自旋粒子波函数在交换下完全反对称:
      ψ(r₁,s₁; r₂,s₂) = −ψ(r₂,s₂; r₁,s₁)。
      推论: 无两个全同费米子占据同一量子态 (Pauli 不相容原理)。
    premise:
      - kernel.lorentz_invariance        # R1: Lorentz 不变性 + 微观因果性
      - kernel.superposition_principle    # R4a: Hilbert 空间
      - kernel.unitary_evolution          # R4b: 幺正演化 → 正能量
      - kernel.spacetime_dimensionality

    variables:
      - { symbol: "ψ_l(x)", type: "field operator", dim: "依赖表示", meaning: "量子场算符，l 为 Lorentz 表示指标" }
      - { symbol: "a(p,σ)", type: "operator", dim: "[L³]", meaning: "动量为 p、自旋投影为 σ 的粒子湮灭算符" }
      - { symbol: "b^†(p,σ)", type: "operator", dim: "[L³]", meaning: "动量为 p、自旋投影为 σ 的反粒子产生算符" }
      - { symbol: "u_l(p,σ)", type: "complex coefficient function", dim: "依赖表示", meaning: "正频解系数函数（粒子-反粒子配对系数）" }
      - { symbol: "v_l(p,σ)", type: "complex coefficient function", dim: "依赖表示", meaning: "负频解系数函数" }
      - { symbol: "D^{(j)}_{σ'σ}(W)", type: "representation matrix", dim: "[1]", meaning: "Lorentz 群 (j,0)⊕(0,j) 表示矩阵; W 为 Wigner 旋转" }
      - { symbol: "j", type: "nonnegative half-integer", dim: "[1]", meaning: "粒子自旋: j ∈ {0, ½, 1, ¾, 2, …}" }
      - { symbol: "(x−y)²", type: "ℝ", dim: "[L²]", meaning: "类空间隔条件，即 (x−y)² < 0" }
      - { symbol: "P^μ", type: "operator", dim: "[M·L·T⁻¹]", meaning: "能量-动量四矢量算符; 谱条件: P⁰ ≥ 0, P² = m²" }
      - { symbol: "η_{μν}", type: "metric tensor", dim: "[1]", meaning: "Minkowski 度规 diag(+1,−1,−1,−1)" }

    steps:
      - step: 1
        step_type: external_theorem
        description: "Lorentz 群的有限维不可约表示分类"
        expression: >
          固有正时 Lorentz 群 L↑₊ 的有限维不可约表示由一对 (半)整数 (A,B) 标记。
          表示空间维数为 (2A+1)(2B+1)。物理自旋 j 由 |A−B|, …, A+B 取值。
        justification: >
          Lorentz 群 Lie 代数 so(3,1) ≅ su(2)⊕su(2) 的表示论标准结果。
          场算符必须按 Lorentz 群的某个有限维表示变换。
        condition: "[N] R1: Lorentz 不变性定义场算符的变换律"
        reference: "Weinberg Vol.I §2.5, §5.1"

      - step: 2
        step_type: in_project
        description: "R4a 构造单粒子 Hilbert 空间"
        expression: "单粒子态 |p,σ⟩ 构成 Hilbert 空间 H₁ 的完备基: ⟨p',σ'|p,σ⟩ = δ³(p'−p) δ_{σ'σ}"
        justification: >
          R4a (叠加原理) 要求物理态构成 Hilbert 空间。单粒子态由动量 p (在质量壳 p²=m², p⁰>0 上) 和自旋投影 σ ∈ {−j,…,+j} 参数化。
        condition: "[N] R4a: 没有 Hilbert 空间则无可定义的量子态"

      - step: 3
        step_type: external_theorem
        description: "簇分解原理 (Cluster Decomposition) → 场必须由产生/湮灭算符构建"
        expression: >
          S 矩阵的簇分解性 ⇔ 相互作用 Hamilton 量密度 H(x) 必须由场算符构成,
          且场算符由产生算符 a^†(p,σ) 和湮灭算符 b(p,σ) 的线性组合表达。
        justification: >
          簇分解原理（远距分离的实验不相关）是任何局域量子场论的基础要求。
          Weinberg (Vol.I §4.3-4.4) 证明这是 S 矩阵满足簇分解性的充要条件。
          这一定理独立于微扰论，是构造性量子场论的核心结果。
        condition: "[N] 局域性要求 (R1 因果结构的推论)"
        reference: "Weinberg Vol.I §4.4; Wightman 公理体系的局域性公理"

      - step: 4
        step_type: external_theorem
        description: "自由场的一般展开形式"
        expression: >
          ψ_l(x) = (2π)^{−3/2} Σ_σ ∫ d³p/(2p⁰)^{½} [κ u_l(p,σ) a(p,σ) e^{−ip·x}
          + λ v_l(p,σ) b^†(p,σ) e^{+ip·x}]
          其中 κ, λ 为归一化系数，p⁰ = √(p²+m²) > 0。
        justification: >
          Step 3 的推论: 场算符必须同时包含正频湮灭项 (∝ e^{−ip·x} a) 和
          负频反粒子产生项 (∝ e^{+ip·x} b^†)。二者缺一不可，否则无法同时满足
          微观因果性和 Lorentz 协变性（此即反粒子存在的必然性）。
        condition: "[N] 谱条件 (R4b 的幺正演化 → P^μ 的谱) 保证 p⁰ > 0"
        reference: "Weinberg Vol.I §5.1; Streater & Wightman §3.3"

      - step: 5
        step_type: external_theorem
        description: "系数函数 u_l, v_l 由 Lorentz 表示矩阵确定"
        expression: >
          对自旋 j 的粒子，u_l(p,σ) 和 v_l(p,σ) 由 (j,0)⊕(0,j) 表示的
          Lorentz 变换律完全确定（至多差一个总相位）:
          u_l(Λp,σ) D^{(j)}_{σ'σ}(W(Λ,p)) = S_{lm}(Λ) u_m(p,σ')
          其中 D^{(j)} 为自旋 j 的 SU(2) 表示，S(Λ) 为场所在 Lorentz 表示的矩阵。
        justification: >
          这是 Wigner 对 Lorentz 群正能表示的构造方法在量子场论中的直接推论。
          场的 Lorentz 变换律将系数函数与表示矩阵绑定。
        condition: "[N] R1 ≈ Lorentz 不变性; R4b ≈ 幺正性保证 D^{(j)} 的酉性"
        reference: "Weinberg Vol.I §5.1 (Eq. 5.1.22-23); Wigner (1939)"

      - step: 6
        step_type: external_theorem
        description: "产生/湮灭算符的对易或反对易代数"
        expression: >
          [a(p,σ), a^†(p',σ')]_± = δ³(p−p') δ_{σσ'}
          [b(p,σ), b^†(p',σ')]_± = δ³(p−p') δ_{σσ'}
          所有其他 (反)对易子为零。符号 + 表示反对易子 (费米子)，− 表示对易子 (玻色子)。
        justification: >
          R4a + R4b: Hilbert 空间上的算符代数。取对易子还是反对易子正是
          自旋-统计定理要决定的。目前两种符号皆数学上自洽。
        condition: "[N] R4a (叠加) + R4b (幺正) 赋予算符代数结构"

      - step: 7
        step_type: in_project
        description: "微观因果性条件 (Microcausality)"
        expression: "对 (x−y)² < 0 (类空间隔): [ψ_l(x), ψ_m(y)]_± = 0"
        justification: >
          R1 (微观因果性): 类空分离的事件之间不得有因果影响。所有物理
          可观测量必须是场算符的双线性型，所以类空间隔下场算符必须对易或
          反对易。注: 两个场算符的积 (如 ψ_l(x)ψ_m(y)) 本身不是可观测量，
          但可观测量涉及场的双线性组合 (如电流 J^μ)，其类空对易性要求
          [ψ_l, ψ_m]_± = 0。
        condition: "[N] R1 (Lorentz 因果结构: 类空 ⇒ 无因果联系)"

      - step: 8
        step_type: external_theorem
        description: "计算类空 (反)对易子"
        expression: >
          [ψ_l(x), ψ_m(y)]_± = (2π)^{−3} Σ_σ ∫ d³p/(2p⁰) [
          κ² u_l(p,σ) u*_m(p,σ) e^{−ip·(x−y)}
          ∓ λ² v_l(p,σ) v*_m(p,σ) e^{+ip·(x−y)} ]
        justification: >
          代入 Step 4 的场展开和 Step 6 的算符代数。积分中 "∓" 的符号:
          取 − (对易子) 时第二项前为 −；取 + (反对易子) 时第二项前为 +。
        condition: "[N] 假定 b 和 b^† 满足与 a, a^† 相同的 (反)对易关系 (CPT 对称性保证)"

      - step: 9
        step_type: external_theorem
        description: "CPT 定理给出系数函数的关系"
        expression: >
          CPT 对称性 (Lorentz 不变性的推论, 见 Streater & Wightman §3.8) 要求:
          v_l(p,σ) ∝ u*_l(p,σ) (至多差一个幺正旋转)。
          这意味着 Σ_σ v_l v*_m ∝ Σ_σ u_l u*_m，二者对积分贡献的矩阵结构相同。
        justification: >
          CPT 定理是 Lorentz 不变性 + 局域性 + 谱条件在任意量子场论中的普遍推论。
          此处仅需 CPT 的一个直接后果: 反粒子系数函数与粒子系数函数的矩阵结构一致。
        condition: "[N] Lorentz 不变性 ⇒ CPT 定理 (不依赖自旋-统计选择)"
        reference: "Streater & Wightman §3.8 'PCT Theorem'; Weinberg Vol.I §5.8"

      - step: 10
        step_type: external_theorem
        description: "类空间隔下, 积分必须为零 → 符号选择"
        expression: >
          当 (x−y)² < 0 时, e^{−ip·(x−y)} 和 e^{+ip·(x−y)} 积分不各自为零,
          但 u_l u*_m 的组合在统计符号取错时会引入因子 (−1)^{2j}:
          整数自旋 (玻色子): 系数结构对称 ⇒ 取反对易子时 e^{-ipx} 和 e^{+ipx}
          项无法抵消 ⇒ 必须取对易子 ⇒ Bose 统计
          半整数自旋 (费米子): 系数结构反对称 ⇒ 取对易子时两项同号,
          无法抵消 ⇒ 必须取反对易子 ⇒ Fermi 统计
        justification: >
          这是自旋-统计定理的数学核心。具体论证如下:
          对于 (j,0)⊕(0,j) 表示, u_l(p,σ) u*_m(p,σ) 可写为自旋 j 表示的
          SL(2,C) 协变多项式 × (−1)^{2j} 因子。在类空间隔下:
          若 j 为整数: u u* 项在 p → −p 下为偶 ⇒ 对换 e^{−ipx} 和 e^{+ipx} 的符号后,
          两项同号 (对易子) 或异号 (反对易子)。类空积分强制异号 ⇒ 必须取对易子。
          若 j 为半整数: u u* 项在 p → −p 下为奇 ⇒ 符号相反 ⇒ 必须取反对易子。
        condition: "[N] 此步是推导的核心: Lorentz 表示论 + 解析延拓 + 类空约束"
        reference: "Weinberg Vol.I §5.7 (pp.237-241); Streater & Wightman §4.4"

      - step: 11
        step_type: in_project
        description: "费米子侧结论: 场算符反对易"
        expression: "对半整数自旋 j (费米子): {ψ_l(x), ψ_m(y)} = 0 当 (x−y)² < 0"
        justification: >
          Step 10 对半整数自旋的直接结论。这也是 Step 7 (微观因果性)
          在取反对易子形式下的满足条件。注意: 场算符本身非物理——仅
          双线性可观测量 (如 J^μ, T^{μν}) 需要类空对易, 而 ψ(x)ψ(y) 的
          反对易性足以保证双线性型的对易性。
        cross_references: ["M3: SM fermion content classified by spin-statistics"]
        cross_references: ["cor.fermi_dirac: Pauli exclusion → n_i∈{0,1} → Fermi-Dirac distribution"]

      - step: 12
        step_type: in_project
        description: "多粒子波函数的反对称性"
        expression: "ψ(r₁,s₁; r₂,s₂) = −ψ(r₂,s₂; r₁,s₁)"
        justification: >
          多费米子态 |r₁,s₁; r₂,s₂⟩ = φ^†(r₁,s₁) φ^†(r₂,s₂) |0⟩。
          产生算符的反对易性 {φ^†(r₁,s₁), φ^†(r₂,s₂)} = 0 从场算符的
          反对易性继承而来 (field-operator → creation-operator 反对易性
          在等时极限下一致)。因此:
          ψ(r₁,s₁; r₂,s₂) = ⟨0|φ(r₂,s₂) φ(r₁,s₁)|Ψ⟩
          = −⟨0|φ(r₁,s₁) φ(r₂,s₂)|Ψ⟩ = −ψ(r₂,s₂; r₁,s₁)
          多粒子波函数在任意两粒子交换下完全反对称。
        condition: "[N] 场算符反对易性 (Step 11) 是波函数反对称性的直接来源"

      - step: 13
        step_type: in_project
        description: "Pauli 不相容原理"
        expression: "ψ(…, r_i, s_i; …, r_j, s_j; …) = 0 当 (r_i,s_i) = (r_j,s_j)"
        justification: >
          反对称波函数 (Step 12) 的直接推论。若两粒子占据全同量子态
          (r_i,s_i) = (r_j,s_j), 交换两粒子后波函数应不变 (因粒子全同)，
          但反对称性要求波函数变号: ψ = −ψ ⇒ 2ψ = 0 ⇒ ψ ≡ 0。
          物理含义: 无两个全同费米子可占据同一量子态。
          此即 Pauli 不相容原理 (Pauli 1925, 以经验规则形式;
          Pauli 1940, 自旋-统计定理的数学证明)。
        cross_references:
          - "M3: SM fermions (quarks, leptons) obey Pauli → atomic shell structure, chemistry"
          - "M4: Nernst theorem — ground state degeneracy g₀ determined by Pauli exclusion"
          - "cor.fermi_dirac: n_i ∈ {0,1} constraint from Pauli → Fermi-Dirac distribution"

    result: >
      自旋-统计定理 (Step 1-10): R1 (Lorentz + 微观因果性) + R4 (量子结构)
      ⇒ 半整数自旋场反对易 ⇒ 费米子波函数反对称 (Step 12)
      ⇒ Pauli 不相容原理 (Step 13)。
      反向: 整数自旋场对易 ⇒ 玻色子波函数对称 ⇒ Bose-Einstein 凝聚可能。
      此推导包含 13 步逻辑链，标记了项目外定理 (CPT, 簇分解, 表示论)
      与项目内可证步骤。自旋-统计定理的完整严格性植根于 Wightman 公理体系，
      此处给出的是 Weinberg 式的物理推导大纲。

    necessity_conditions:
      - "R1 (Lorentz 不变性 + 微观因果性) [N]: Step 1 (表示论), Step 7 (微因果性), Step 9 (CPT) 的核心前提"
      - "R4a (叠加原理) [N]: Step 2 (Hilbert 空间), Step 6 (算符代数) — 正定度量为 Wightman 公理的前提"
      - "R4b (幺正演化) [N]: Step 4 (谱条件 p⁰>0), Step 5 (表示的酉性) — 正能量依赖幺正表示"
      - "3+1 维时空 [N]: Step 10 的核心结论在 D≠4 时失效 (如 D=2+1 中存在 anyon, 分数统计)。Lorentz 群的覆盖群在 D≠4 时结构不同"
      - "半整数自旋 [N]: Step 10-13 仅对费米子成立；整数自旋 ⇒ Bose 统计 (对易子)"
      - "簇分解原理 [N]: Step 3 — 没有簇分解性, 场不必由产生/湮灭算符构建, 自旋-统计论证失去起点"
      - "CPT 定理 [N]: Step 9 — 没有 CPT, 系数函数 u_l 和 v_l 无必然关系, Step 10 的符号分析不成立"

    sufficiency_conditions:
      - "[S] Lorentz 不变性 + 量子公设 + 微观因果性 ⇒ 自旋-统计定理 (费米子侧)"
      - "[S] 以上 + 整数自旋 ⇒ Bose 统计 (对称波函数)"
      - "注: 充分性在 D=3+1 时是严格的 (Weinberg §5.7; Streater & Wightman §4.4)"

    reversible: false
    reverse_note: >
      Pauli 不相容 ⇏ 自旋-统计定理的完整结构。
      逆方向: 给定满足 Pauli 不相容的经验世界, 可推理场的反对易性,
      但此逆推理需要附加假设 (如: 费米子必须是量子场)。

    validity_scope:
      - quantum_regime
      - relativistic_regime

    caveat: >
      上述 13 步推导大纲区分了两类步骤:
      - external_theorem (Steps 1,3,4,5,6,8,9,10): 依赖 Wightman 公理体系或
        Weinberg 式 LSZ 构造的定理。这些不是 R1-R6 的直接推论, 而是量子场论
        数学结构中的已证定理, 此处作为黑盒引用。
      - in_project (Steps 2,7,11,12,13): 在 R1-R6 框架内可陈述和论证的步骤。
      这一定理的完整严格性超出本项目范围, 但逻辑链的每一环节均已标注前提。
    mathematical_link: "Lorentz + microcausality → spin-statistics → antisymmetric ψ → Pauli exclusion"

  - id: deriv.fermi_dirac_distribution
    conclusion: cor.fermi_dirac
    conclusion_statement: "f(E) = 1/[exp((E−μ)/(k_B T)) + 1]"
    premise:
      - law.pauli_exclusion
