      - { symbol: "ρ", type: "ℝ³ → ℝ", dim: "[M·L⁻³]", domain: "", meaning: "质量密度" }
      - { symbol: "h_{μν}", type: "ℝ^(4×4) 对称", dim: "[1]", domain: "|h_{μν}| ≪ 1", meaning: "度规的微小扰动: g_{μν} = η_{μν} + h_{μν}" }

    steps:
