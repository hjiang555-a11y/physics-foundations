# ─────────────────────────────────────────────────────────────────
# Sci-hf 严格推导 — Rigorous Derivations (Round 2, Batch G1-G3)
# ─────────────────────────────────────────────────────────────────
#
# 本文件包含从 R1–R6 核心原则到全部 32 条定理的严格推导。
# 每条推导满足：
#   1. 所有变量完整定义（符号、类型、量纲、定义域、物理含义）
#   2. 每步可追溯至 R1–R6 或已证定理
#   3. 必要性条件明确标注 [N]
#   4. 充分性条件明确标注 [S]
#   5. 反向蕴含检查（定理 ⇔ 前提？）
#
# 推导分组：
#   G1: Euler-Lagrange (1)
#   G2: Noether + Conservation (2-6)
#   G3: Newton's Laws (7-9)
#   G4: Maxwell from Gauge (10-15)
#   G5: Quantum Mechanics (16-20)
#   G6: Relativity (21-24)
#   G7: Thermodynamics (25-29)
#   G8: Corollaries (30-32)
# ─────────────────────────────────────────────────────────────────

# ═════════════════════════════════════════════════════════════════
# 约定
# ═════════════════════════════════════════════════════════════════
#
# 变量定义格式:
#   symbol:   数学符号
#   type:     数学类型 (ℝ, ℂ, ℝ^n, operator, functional)
#   dim:      量纲 (SI 7 维向量)
#   domain:   定义域 / 取值范围
#   meaning:  物理含义
#
# 必要性标记 [N]:
#   该条件在推导中的每一步都必须成立才能推出结论。
#   若移除，推导在标注处断裂。
#
# 充分性标记 [S]:
#   给定这些条件，结论必然成立。
#   ⇒ 方向表示充分性蕴含。
#
# 反向蕴含 (reversible):
#   true:  定理 + 附加条件 ⇒ 前提（双向等价）
#   false: 定理 ⇒ 前提不成立（有信息丢失）

# ═════════════════════════════════════════════════════════════════
# G1: Euler-Lagrange 方程
# ═════════════════════════════════════════════════════════════════

derivations:

  - id: deriv.euler_lagrange
    conclusion: law.euler_lagrange
    conclusion_statement: >
      d/dt(∂L/∂q̇ᵢ) − ∂L/∂qᵢ = 0  for all i ∈ {1,…,N}
    premise:
      - kernel.least_action       # R2: δS = 0
      - kernel.spacetime_dimensionality  # R1: defines t as coordinate

    # ── 变量定义 ──
    variables:
      - { symbol: "S", type: "functional ℝ → ℝ", dim: "[M·L²·T⁻¹]", domain: "S[q] = ∫ L dt 对所有 C² 路径 q(t) 有定义", meaning: "作用量泛函" }
      - { symbol: "L", type: "ℝ^(2N+1) → ℝ", dim: "[M·L²·T⁻²]", domain: "L ∈ C²(q, q̇, t)", meaning: "拉格朗日量，L = T − V" }
      - { symbol: "qᵢ", type: "ℝ → ℝ", dim: "依赖系统", domain: "qᵢ ∈ C²([t₁,t₂])", meaning: "第 i 个广义坐标" }
      - { symbol: "q̇ᵢ", type: "ℝ → ℝ", dim: "依赖系统", domain: "q̇ᵢ = dqᵢ/dt", meaning: "第 i 个广义速度" }
      - { symbol: "δqᵢ", type: "ℝ → ℝ", dim: "依赖系统", domain: "δqᵢ ∈ C¹([t₁,t₂]), δqᵢ(t₁)=δqᵢ(t₂)=0", meaning: "路径的无穷小变分" }
      - { symbol: "t", type: "ℝ", dim: "[T]", domain: "t ∈ [t₁, t₂]", meaning: "时间坐标 (R1)" }
      - { symbol: "N", type: "ℕ⁺", dim: "[1]", domain: "N ≥ 1", meaning: "系统广义坐标数（自由度数）" }

    # ── 推导步骤 ──
    steps:
      - step: 1
        description: "从 R2 出发，作用量 S 对路径 q(t) 取极值"
        expression: "S[q] = ∫_{t₁}^{t₂} L(q(t), q̇(t), t) dt"
        justification: "R2 — 最小作用量原理。积分限 (t₁, t₂) 由 R1 的时间坐标定义。"
        condition: "[N] L 必须可微，q(t) 必须 C²"

      - step: 2
        description: "考虑路径的无穷小变分 q(t) → q(t) + δq(t)"
        expression: "δS = S[q + δq] − S[q] = ∫_{t₁}^{t₂} [L(q+δq, q̇+δq̇, t) − L(q, q̇, t)] dt"
        justification: "变分定义。δq(t₁) = δq(t₂) = 0（固定端点条件 [N]）。"
        condition: "[N] δq(t₁) = δq(t₂) = 0 — 路径的端点固定不动"

      - step: 3
        description: "Taylor 展开 L 到一阶"
        expression: "L(q+δq, q̇+δq̇, t) ≈ L(q, q̇, t) + Σᵢ[∂L/∂qᵢ · δqᵢ + ∂L/∂q̇ᵢ · δq̇ᵢ]"
        justification: "多变量 Taylor 展开。高阶项 O(δ²) 在变分取极限时消失。"
        condition: "[N] L ∈ C²（二阶连续可微）"

      - step: 4
        description: "代入 δS，分离两项"
        expression: "δS = Σᵢ ∫_{t₁}^{t₂} [∂L/∂qᵢ · δqᵢ + ∂L/∂q̇ᵢ · δq̇ᵢ] dt"
        justification: "一阶变分 = 作用量的 Gâteaux 导数。"

      - step: 5
        description: "对第二项分部积分"
        expression: "∫_{t₁}^{t₂} ∂L/∂q̇ᵢ · δq̇ᵢ dt = [∂L/∂q̇ᵢ · δqᵢ]_{t₁}^{t₂} − ∫_{t₁}^{t₂} d/dt(∂L/∂q̇ᵢ) · δqᵢ dt"
        justification: "分部积分：∫ u dv = uv − ∫ v du, u = ∂L/∂q̇ᵢ, dv = δq̇ᵢ dt"
        condition: "[N] ∂L/∂q̇ᵢ 对时间可微"

      - step: 6
        description: "边界项因固定端点消失"
        expression: "[∂L/∂q̇ᵢ · δqᵢ]_{t₁}^{t₂} = 0"
        justification: "由 Step 2 的固定端点条件：δqᵢ(t₁) = δqᵢ(t₂) = 0"
        condition: "[N] 必须是固定端点变分"

      - step: 7
        description: "整理得到一阶变分"
        expression: "δS = Σᵢ ∫_{t₁}^{t₂} [∂L/∂qᵢ − d/dt(∂L/∂q̇ᵢ)] · δqᵢ(t) dt"
        justification: "代回 Step 4。"

      - step: 8
        description: "应用 δS = 0（R2 的平稳作用量条件）"
        expression: "Σᵢ ∫_{t₁}^{t₂} [∂L/∂qᵢ − d/dt(∂L/∂q̇ᵢ)] · δqᵢ(t) dt = 0"
        justification: "R2 直接要求：真实路径必须使作用量的一阶变分为零。"

      - step: 9
        description: "应用变分学基本引理"
        expression: "∂L/∂qᵢ − d/dt(∂L/∂q̇ᵢ) = 0  for all i"
        justification: >
          变分学基本引理 (Fundamental Lemma of Calculus of Variations):
          若对任意满足 η(t₁)=η(t₂)=0 的连续函数 η(t) 有 ∫ f(t)η(t) dt = 0,
          且 f(t) 连续, 则 f(t) ≡ 0。
          此处 δqᵢ(t) 可取任意 C¹ 函数满足端点为零，且各 δqᵢ 独立。
        condition: "[N] δqᵢ 的任意性（各广义坐标的变分独立可变）"

    # ── 结果 ──
    result: "d/dt(∂L/∂q̇ᵢ) − ∂L/∂qᵢ = 0"

    # ── 必要性与充分性 ──
    necessity_conditions:
      - "R2 (δS = 0): 若无，Step 8 无依据"
      - "固定端点变分: 若无 δq(t₁)=δq(t₂)=0，Step 6 边界项不消失"
      - "L ∈ C²: L 必须二阶连续可微，否则 Taylor 展开不合法"
      - "δqᵢ 任意且独立: 若无，变分学引理不适用"
      - "R1 定义的时间坐标 t: 积分参数必须是一维连续统"

    sufficiency_conditions:
      - "给定 C² 拉格朗日量 L(q,q̇,t) 和固定端点，δS=0 ⇔ Euler-Lagrange 方程"
      - "[S] R2 + 固定端点 + C² L ⇒ Euler-Lagrange"

    reversible: true
    reverse_note: >
      Euler-Lagrange 方程成立 ⇔ δS=0（对于固定端点变分）。
      双向等价：若 ∂L/∂q − d/dt(∂L/∂q̇) = 0，乘 δq 积分可反向构造 δS=0。

    validity_scope:
      - classical_limit
      - conservative_force
    mathematical_link: "δ∫Ldt = 0 → d/dt(∂L/∂q̇) − ∂L/∂q = 0"

  # ═══════════════════════════════════════════════════════════════
  # G2: Noether 定理
  # ═══════════════════════════════════════════════════════════════

  - id: deriv.noether_theorem
    conclusion: law.noether_theorem
    conclusion_statement: >
      作用量 S 的每个连续对称性变换对应一个守恒的 Noether 荷 Q。
      dQ/dt = 0 沿满足 Euler-Lagrange 方程的真实路径成立。
    premise:
      - kernel.least_action       # R2
      - kernel.spacetime_dimensionality  # R1

    variables:
      - { symbol: "S", type: "functional", dim: "[M·L²·T⁻¹]", domain: "", meaning: "作用量" }
      - { symbol: "L", type: "ℝ^(2N+1) → ℝ", dim: "[M·L²·T⁻²]", domain: "", meaning: "拉格朗日量" }
      - { symbol: "qᵢ", type: "ℝ → ℝ", dim: "依赖系统", domain: "", meaning: "广义坐标" }
      - { symbol: "ε", type: "ℝ", dim: "[1]", domain: "|ε| ≪ 1", meaning: "连续变换的无穷小参数" }
      - { symbol: "Qᵢ(q,q̇,t)", type: "ℝ^N → ℝ^N", dim: "依赖变换", domain: "", meaning: "对称性变换的生成函数" }
      - { symbol: "F(q,q̇,t)", type: "ℝ", dim: "与 L 同量纲", domain: "", meaning: "规范函数；L 变化的边界项（总时间导数）" }
      - { symbol: "Λ(q,q̇,t)", type: "ℝ^(2N+1) → ℝ", dim: "[M·L²·T⁻¹]", domain: "", meaning: "Noether 荷密度的边界项贡献" }

    steps:
      - step: 1
        description: "定义对称性变换"
        expression: "qᵢ → qᵢ' = qᵢ + ε·Qᵢ(q,q̇,t) + O(ε²)"
        justification: >
          连续对称性：存在一个单参数 Lie 群变换，参数 ε，
          使得作用量在此变换下不变（至多差一个边界项）。
        condition: "[N] Qᵢ 为 C¹（变换生成元可微）"

      - step: 2
        description: "作用量的对称性条件"
        expression: "S[q'] = S[q] + ε·[F(t₂) − F(t₁)] + O(ε²)"
        justification: >
          对称性的精确定义：变换后的作用量与变换前的作用量相差一个边界项 ε·[F(t₂)−F(t₁)]。
          边界项的存在意味着 Lagrangian 变换至多差一个总时间导数：
          L(q',q̇',t) = L(q,q̇,t) + ε·dF/dt + O(ε²)
        condition: "[N] 若想得到守恒律，变换必须保持作用量不变（δS_boundary = 0）"

      - step: 3
        description: "展开 L(q',q̇',t) 到一阶"
        expression: >
          L(q',q̇',t) − L(q,q̇,t) = ε·Σᵢ[∂L/∂qᵢ·Qᵢ + ∂L/∂q̇ᵢ·Q̇ᵢ] + O(ε²)
        justification: "链式法则 + Step 1 的变换定义"
        condition: "[N] L ∈ C²"

      - step: 4
        description: "利用 Euler-Lagrange 方程替换 ∂L/∂qᵢ"
        expression: "∂L/∂qᵢ = d/dt(∂L/∂q̇ᵢ)"
        justification: "Euler-Lagrange（G1 结论）沿真实路径成立"
        condition: "[N] 系统满足 Euler-Lagrange 方程（即沿真实动力学路径）"

      - step: 5
        description: "代入并重组为全导数"
        expression: >
          Σᵢ[d/dt(∂L/∂q̇ᵢ)·Qᵢ + ∂L/∂q̇ᵢ·Q̇ᵢ] = d/dt(Σᵢ ∂L/∂q̇ᵢ·Qᵢ)
        justification: "乘法法则：d/dt(u·v) = u̇·v + u·v̇"
        condition: "[N] 乘积可微"

      - step: 6
        description: "对称性条件给出全导数关系"
        expression: "d/dt(Σᵢ ∂L/∂q̇ᵢ·Qᵢ − F) = 0"
        justification: >
          Step 5 给出 L 的变化 = ε·d/dt(Σᵢ ∂L/∂q̇ᵢ·Qᵢ)。
          Step 2 的对称性条件要求 L 的变化 = ε·dF/dt。
          两者相等 ⇒ d/dt(Σᵢ ∂L/∂q̇ᵢ·Qᵢ − F) = 0

      - step: 7
        description: "定义 Noether 荷 Q"
        expression: "Q ≡ Σᵢ (∂L/∂q̇ᵢ)·Qᵢ − F"
        justification: "Q 是守恒量：dQ/dt = 0 沿真实路径"

    result: >
      Noether 定理：作用量 S 的每个连续对称性（由 Qᵢ 生成，至多差边界项 F）
      对应守恒荷 Q = Σᵢ (∂L/∂q̇ᵢ)·Qᵢ − F，满足 dQ/dt = 0。

    necessity_conditions:
      - "R2 (δS = 0): Euler-Lagrange 方程是推导的必要中间步骤（Step 4）"
      - "R1 (时间坐标): 全导数 d/dt 要求时间在 R1 定义下是连续坐标"
      - "连续对称性: 必须有 Lie 群结构 → 无穷小生成元 Qᵢ 存在"
      - "C² L: 偏导数存在且连续"
      - "Euler-Lagrange 方程成立: 沿真实路径（on-shell）"

    sufficiency_conditions:
      - "[S] 连续对称性 + Euler-Lagrange 方程 ⇒ 守恒流存在"
      - "Noether 定理是充要的：每个守恒量对应一个对称性（逆 Noether 定理也成立）"

    reversible: true
    reverse_note: "逆 Noether 定理：每个守恒量可反推出一个连续对称性"

    validity_scope: []
    mathematical_link: "连续对称性 + δS=0 ⇒ dQ/dt = 0"

  # ── Noether 推论: 能量守恒 ──

  - id: deriv.energy_conservation
    conclusion: law.energy_conservation
    conclusion_statement: "dE/dt = 0（孤立系统）；∂_μ T^{μν} = 0（局部形式）"
    premise:
      - law.noether_theorem
      - kernel.spacetime_dimensionality

    variables:
      - { symbol: "E", type: "ℝ", dim: "[M·L²·T⁻²]", domain: "", meaning: "系统总能量 = Hamiltonian H" }
      - { symbol: "H", type: "ℝ", dim: "[M·L²·T⁻²]", domain: "H = Σᵢ pᵢq̇ᵢ − L", meaning: "Hamiltonian = Legendre 变换的 Lagrangian" }
      - { symbol: "pᵢ", type: "ℝ", dim: "依赖系统", domain: "pᵢ = ∂L/∂q̇ᵢ", meaning: "广义动量" }
      - { symbol: "δt", type: "ℝ", dim: "[T]", domain: "|δt| ≪ 1", meaning: "无穷小时间平移参数" }

    steps:
      - step: 1
        description: "时间平移变换"
        expression: "t → t' = t + ε,  qᵢ(t) → qᵢ'(t') = qᵢ(t)"
        justification: "主动观点：将整个系统沿时间轴平移 ε。qᵢ' 是平移后的新坐标函数。"
        condition: "[N] R1 定义的时间坐标 t 支持平移运算"

      - step: 2
        description: "识别 Noether 定理所需的 Qᵢ"
        expression: "用被动语言：δqᵢ = qᵢ'(t) − qᵢ(t) = qᵢ(t−ε) − qᵢ(t) ≈ −ε·q̇ᵢ"
        justification: "Taylor 展开：qᵢ(t−ε) ≈ qᵢ(t) − ε·q̇ᵢ ⇒ Qᵢ = −q̇ᵢ"
        condition: "[N] qᵢ 可微"

      - step: 3
        description: "若 L 不显含 t（∂L/∂t = 0），则时间平移是对称性"
        expression: "∂L/∂t = 0 ⇒ L 在 t → t+ε 下不变（至多差全导数 dL/dt）"
        justification: "若 L = L(q, q̇) 不显含 t，则 dL/dt = Σᵢ(∂L/∂qᵢ·q̇ᵢ + ∂L/∂q̇ᵢ·q̈ᵢ)"
        condition: "[N] ∂L/∂t = 0（拉格朗日量不显含时间）"

      - step: 4
        description: "应用 Noether 定理"
        expression: "Q = Σᵢ (∂L/∂q̇ᵢ)·(−q̇ᵢ) − (−L) = −Σᵢ pᵢ·q̇ᵢ + L = L − Σᵢ pᵢ·q̇ᵢ"
        justification: >
          规范函数：变换后的 Lagrangian L' = L(q(t−ε), q̇(t−ε)) = L − ε·dL/dt。
          所以 F = −L（因为 L' − L = −ε·dL/dt = ε·d(−L)/dt）。
          守恒荷：Q = Σᵢ pᵢ·(−q̇ᵢ) − (−L) = −(Σᵢ pᵢ·q̇ᵢ − L) = −H。

      - step: 5
        description: "定义能量 E = H = Σᵢ pᵢ·q̇ᵢ − L"
        expression: "dE/dt = 0"
        justification: "能量守恒 = 时间平移对称性的 Noether 荷"

    result: "∂L/∂t = 0 ⇒ dE/dt = 0（能量守恒）"

    necessity_conditions:
      - "Noether 定理 (law.noether_theorem)"
      - "∂L/∂t = 0 [N]: 拉格朗日量不显含时间 — 若显含时间，能量不守恒"
      - "R1 定义的时间坐标: 时间平移的数学基础"

    sufficiency_conditions:
      - "[S] ∂L/∂t = 0 + Noether ⇒ dE/dt = 0"

    reversible: true
    reverse_note: >
      dE/dt = 0 ⇒ ∂L/∂t = 0? 是——若能量守恒且 Euler-Lagrange 成立，
      可反推出 ∂L/∂t = 0。

    validity_scope:
      - isolated_system
      - conservative_force
    mathematical_link: "t → t+ε 对称性 → Noether → dE/dt = 0"

  # ── Noether 推论: 动量守恒 ──

  - id: deriv.momentum_conservation
    conclusion: law.momentum_conservation
    conclusion_statement: "dP/dt = 0（孤立系统）"
    premise:
      - law.noether_theorem
      - kernel.spacetime_dimensionality

    variables:
      - { symbol: "P", type: "ℝ^D", dim: "[M·L·T⁻¹]", domain: "P = Σᵢ mᵢvᵢ", meaning: "系统总动量" }
      - { symbol: "δr", type: "ℝ^D", dim: "[L]", domain: "|δr| ≪ 1", meaning: "无穷小空间平移矢量" }
      - { symbol: "D", type: "ℕ⁺", dim: "[1]", domain: "D = 3 (R1)", meaning: "空间维数" }

    steps:
      - step: 1
        description: "空间平移变换"
        expression: "r → r' = r + ε·n̂（n̂ 为任意方向的单位矢量）"
        justification: "平直空间（R1 的局域惯性系中）的均匀性"
        condition: "[N] 空间必须是均匀的（平直极限或具有平移 Killing 矢量的弯曲空间）"

      - step: 2
        description: "若 L 在空间平移下不变，识别 Qᵢ"
        expression: "δrᵢ = ε·n̂ ⇒ Qᵢ = n̂（对于位置坐标 rᵢ）"
        justification: "每个粒子的位置坐标以相同量平移"

      - step: 3
        description: "L 的不变性条件"
        expression: "∂L/∂r = 0（无外力，L 不依赖于绝对位置）"
        justification: "若 V 仅依赖于粒子间的相对距离 |rᵢ−rⱼ|，则 L 在整体平移下不变"
        condition: "[N] 无外力场破坏空间均匀性"

      - step: 4
        description: "应用 Noether 定理"
        expression: "P = Σᵢ (∂L/∂ṙᵢ)·n̂ = (Σᵢ mᵢvᵢ)·n̂"
        justification: "∂L/∂ṙᵢ = mᵢvᵢ (对于粒子系统的 L = Σ ½mᵢvᵢ² − V)"

      - step: 5
        description: "动量守恒"
        expression: "dP/dt = 0（沿 n̂ 方向）→ 总动量矢量守恒"
        justification: "对所有方向 n̂ 成立 ⇒ P 矢量守恒"
        condition: "[N] 孤立系统（无外力）"

    result: "空间平移不变性 ⇒ dP/dt = 0"

    necessity_conditions:
      - "Noether 定理"
