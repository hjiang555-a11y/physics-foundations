  - id: deriv.lorentz_transformation
    conclusion: law.lorentz_transform
    conclusion_statement: "t' = γ(t−vx/c²), x' = γ(x−vt), γ = 1/√(1−v²/c²)"
    premise:
      - kernel.lorentz_invariance  # R1
      - kernel.lorentz_invariance      # R1
      - kernel.spacetime_dimensionality

    variables:
      - { symbol: "γ", type: "ℝ⁺", dim: "[1]", domain: "γ ≥ 1", meaning: "Lorentz 因子" }
      - { symbol: "v", type: "ℝ", dim: "[L·T⁻¹]", domain: "|v| < c", meaning: "两惯性系相对速度" }
      - { symbol: "S, S'", type: "参考系", dim: "—", domain: "惯性系", meaning: "两个以相对速度 v 沿 x 轴运动的惯性系" }

    steps:
      - step: 1
        description: "基本假设: c 在所有惯性系中不变"
        expression: "c' = c"
        justification: "R1: kernel.lorentz_invariance。光速是绝对常数。"

      - step: 2
        description: "间隔不变性"
        expression: "Δs² = c²Δt² − Δx² = c²Δt'² − Δx'²"
        justification: "R1: kernel.lorentz_invariance。时空间隔在 Lorentz 变换下不变。"

      - step: 3
        description: "假设线性变换（齐次 + 时空均匀性）"
        expression: "x' = Ax + Bt, t' = Cx + Dt"
        justification: "时空的均匀性和各向同性 (R1) 保证变换为线性。"
        condition: "[N] 时空均匀 → 变换为线性（无 x² 项）"

      - step: 4
        description: "标准构型条件"
        expression: >
          S' 原点 (x'=0) 在 S 中速度为 v: x = vt
          S  原点 (x=0) 在 S' 中速度为 −v: x' = −vt'
        justification: "定义两系相对速度为 v。"

      - step: 5
        description: "从标准构型和间隔不变性求解系数"
        expression: ""
        justification: >
          从 Step 4 的标准构型:
          (a) S' 原点 x'=0 在 S 中: x = vt ⇒ 代入 x'=Ax+Bt: 0 = Avt+Bt ⇒ B = −vA
          (b) S 原点 x=0 在 S' 中: x' = −vt' ⇒ 代入逆变换 x = A⁻¹(x'−Bt') 等,
              或直接从对称性得逆变换为 x = γ(x'+vt'), t = γ(t'+vx'/c²)
          (c) 将线性形式 x'=A(x−vt), t'=Cx+Dt 代入间隔不变性:
              c²(Cx+Dt)² − A²(x−vt)² = c²t² − x²
              展开并比对 t², x², xt 的系数:
              t²: c²D² − A²v² = c²
              x²: c²C² − A² = −1
              xt: 2c²CD + 2A²v = 0
          (d) 求解: 从 xt 项得 C = −vD/c²。代入 x² 项并用 t² 项消除:
              得 D = γ ≡ 1/√(1−v²/c²), A = γ, C = −γv/c²。
          (e) 最终: x' = γ(x−vt), t' = γ(t−vx/c²)。

      - step: 6
        description: "γ 因子的确定"
        expression: "γ = 1/√(1 − v²/c²)"
        justification: >
          将变换代入 c²t'²−x'²=c²t²−x²:
          c²γ²(t−vx/c²)² − γ²(x−vt)² = c²t²−x²
          ⇒ γ²(c²t²−2vtx+v²x²/c² − x²+2vxt−v²t²) = c²t²−x²
          ⇒ γ²(c²−v²)t² − γ²(1−v²/c²)x² = c²t²−x²
          ⇒ γ²=1/(1−v²/c²) 使系数匹配

    result: "Lorentz 变换: t'=γ(t−vx/c²), x'=γ(x−vt)"

    necessity_conditions:
      - "c 不变 [N]: 若无 c=常数 ⇒ 退化为 Galilei 变换 (c→∞)"
      - "时空间隔不变 [N]: Lorentz 不变性是狭义相对论的核心结构"
      - "线性变换 [N]: 时空均匀性要求"
      - "|v|<c [N]: v=c 时 γ 发散（类光极限）；v>c 时 γ 为虚数（超光速不物理）"

    sufficiency_conditions:
      - "[S] c 不变 + 间隔不变 + 线性 ⇒ Lorentz 变换"

    reversible: true
    validity_scope:
      - inertial_frame
      - relativistic_regime
    mathematical_link: "c²t'²−x'²=c²t²−x² → t'=γ(t−vx/c²), x'=γ(x−vt), γ=1/√(1−v²/c²)"

