  - id: deriv.higgs_mechanism
    conclusion: cor.higgs_mechanism
    conclusion_statement: >
      Spontaneous breaking SU(2)_L × U(1)_Y → U(1)_EM via Higgs doublet φ.
      W^± mass = g₂v/2, Z mass = √(g₁²+g₂²)v/2, photon massless.
    premise:
      - contingent.sm_gauge_group
      - contingent.sm_higgs_sector
      - kernel.gauge_interactions

    variables:
      - { symbol: "φ", type: "ℂ²", dim: "[M]", domain: "φ = (φ^+, φ⁰)^T (Y=1 SU(2)_L doublet)", meaning: "Higgs 二重态" }
      - { symbol: "v", type: "常数", dim: "[M]", domain: "v ≈ 246 GeV", meaning: "Higgs 真空期望值: v = √(−μ²/λ)" }
      - { symbol: "g₂", type: "常数", dim: "[1]", domain: "g₂ > 0", meaning: "SU(2)_L 规范耦合常数" }
      - { symbol: "g₁", type: "常数", dim: "[1]", domain: "g₁ > 0", meaning: "U(1)_Y 规范耦合常数" }
      - { symbol: "W^±_μ", type: "vector field", dim: "[M]", domain: "", meaning: "带电弱矢量玻色子; m_W ≈ 80.4 GeV" }
      - { symbol: "Z_μ", type: "vector field", dim: "[M]", domain: "", meaning: "中性弱矢量玻色子; m_Z ≈ 91.2 GeV" }
      - { symbol: "A_μ", type: "vector field", dim: "[1]", domain: "", meaning: "光子场 (无质量)" }
      - { symbol: "θ_W", type: "常数", dim: "[1]", domain: "sin²θ_W ≈ 0.231", meaning: "Weinberg 弱混合角; tan θ_W = g₁/g₂" }
      - { symbol: "τ^a", type: "2×2 矩阵", dim: "[1]", domain: "τ^a = σ^a/2 (Pauli 矩阵的一半)", meaning: "SU(2) 生成元" }

    steps:
      - step: 1
        description: "SM 规范群 + Higgs 二重态"
        expression: "Gauge group: SU(2)_L × U(1)_Y. Higgs: φ = (φ^+, φ⁰)^T, Y_φ = 1"
        justification: >
          SM 规范群结构 (contingent.sm_gauge_group) 定义规范玻色子:
          W^a_μ (a=1,2,3) for SU(2)_L, B_μ for U(1)_Y.
          Higgs 二重态 (contingent.sm_higgs_sector) 是能与规范玻色子
          耦合的最简标量表示。这是 SM 的 contingent 选择 — 其他表示
          (如 Higgs 三重态, Georgi-Glashow SU(5)) 也会改变物理预测。
        condition: "[N] R3: 规范不变性定义 W^a_μ 和 B_μ 的存在性"

      - step: 2
        description: "Higgs 势与自发对称破缺"
        expression: "V(φ) = μ²|φ|² + λ|φ|⁴, 其中 λ > 0"
        justification: >
          最一般的可重整规范不变 Higgs 势 (至多四次项)。
          若 μ² > 0: 极小值在 |φ|=0 (未破缺)。
          若 μ² < 0: 极小值在 |φ|² = −μ²/(2λ) ≡ v²/2 > 0 — 连续退化真空流形。
          选择特定真空方向 (规范固定) → 自发对称破缺。
          SM 取 μ² < 0 是 contingent 事实 — 给出 v ≈ 246 GeV。
        condition: "[N] μ² < 0 — 否则无自发对称破缺, W/Z 无质量"

      - step: 3
        description: "真空期望值与激发"
        expression: "在幺正规范 (unitary gauge): φ(x) = (0, (v+h(x))/√2)^T, ⟨0|φ|0⟩ = (0, v/√2)^T"
        justification: >
          使用 SU(2)_L 规范自由度 (3 个参数) 将 φ 旋转为标准形式: φ^+=0, Im(φ⁰)=0。
          这对应"吃掉"了三个 Nambu-Goldstone 玻色子。
          残留在物理谱中的是实标量场 h(x) — Higgs 玻色子。
          h 的质量: m_h² = 2λv² = −2μ² (实验值 ≈ 125 GeV)。
        condition: "[N] SU(2)_L 的 3 个规范参数恰好匹配 3 个 Goldstone 方向"

      - step: 4
        description: "协变导数作用于 Higgs 真空"
        expression: >
          D_μφ = [∂_μ − i g₂ τ^a W^a_μ − i g₁ (Y/2) B_μ] φ
          代入 φ = (0, v/√2)^T (忽略 h 项, 聚焦质量生成)
        justification: >
          协变导数编码规范玻色子与 Higgs 的耦合。
          Y=1 是 Higgs 二重态的超荷赋值 (contingent 事实)。
          τ^a = σ^a/2 是 SU(2) 在基础表示中的生成元。

      - step: 5
        description: "动能项产生规范玻色子质量"
        expression: >
          |D_μφ|²|_φ=(0,v/√2) = (g₂²v²/8)[(W¹_μ)² + (W²_μ)²]
          + (v²/8)(g₂ W³_μ − g₁ B_μ)²
        justification: >
          代入 τ^a 和 φ 的值:
          τ^1 φ = (φ⁰, φ^+)ᵀ/2 → (v/(2√2), 0)ᵀ; τ^2 φ = (−iφ⁰, iφ^+)ᵀ/2 → (−iv/(2√2), 0)ᵀ;
          τ^3 φ = (φ^+, −φ⁰)ᵀ/2 → (0, −v/(2√2))ᵀ。
          平方后得到规范玻色子的质量项。

      - step: 6
        description: "物理质量本征态"
        expression: >
          W^±_μ = (W¹_μ ∓ iW²_μ)/√2,  M_W = g₂v/2
          Z_μ = cos θ_W W³_μ − sin θ_W B_μ,  M_Z = √(g₁²+g₂²)v/2 = M_W/cos θ_W
          A_μ = sin θ_W W³_μ + cos θ_W B_μ,  M_A = 0
        justification: >
          W^± 组合对角化带电部分的质量矩阵。
          中性部分 (W³_μ, B_μ) 的质量矩阵: M²_neutral ∝ [[g₂², −g₁g₂], [−g₁g₂, g₁²]]。
          本征值: 0 (光子) 和 g₁²+g₂² (Z 玻色子)。
          Weinberg 角: tan θ_W = g₁/g₂ → 旋转到物理基。
          sin²θ_W ≈ 0.231 (实验值)。
        condition: "[N] 质量矩阵的秩为 1 ⇒ 恰好 1 个零本征值 → 光子无质量"

      - step: 7
        description: "Fermi 常数关系"
        expression: "G_F/√2 = g₂²/(8M_W²) = 1/(2v²)"
        justification: >
          低能有效理论 (μ ≪ M_W) 中, W 玻色子被积掉 (integrated out),
          留下四费米子相互作用: L_eff = −(G_F/√2) J^μ_CC J_{CC,μ}^†。
          由 M_W 和 g₂ 的关系: G_F/√2 = g₂²/(8M_W²) = 1/(2v²)。
          G_F = 1.1663788×10⁻⁵ GeV⁻² → v = (√2 G_F)^{−½} ≈ 246 GeV。
        cross_references:
          - "M2: Lovelock — same 'symmetry → Lagrangian → observables' methodology"
          - "M1: fermion masses via Yukawa couplings — quarks & leptons are fermions → Pauli exclusion"

    result: "SU(2)_L×U(1)_Y → U(1)_EM: M_W = g₂v/2, M_Z = M_W/cos θ_W, M_A = 0"

    necessity_conditions:
      - "SU(2)_L × U(1)_Y 规范群 [N]: 规范玻色子谱与耦合结构不由更基础原理推出 (contingent)"
      - "Higgs 二重态 + μ² < 0 [N]: 无自发对称破缺 → 无质量生成 → SM 与实验矛盾"
      - "R3 (规范不变性) [N]: 协变导数和规范-Higgs 耦合的基础"
      - "Higgs 表示选择 [N]: 二重态 (而非其他表示) 是 SM 的 contingent 事实 — 不同的表示产生不同的质量关系 ρ = M_W²/(M_Z² cos²θ_W)"

    sufficiency_conditions:
      - "[S] SM 规范群 + Higgs 二重态 + μ²<0 ⇒ W/Z 质量 + 光子无质量 + ρ=1 (树图级)"

    reversible: false
    validity_scope:
      - quantum_regime
      - relativistic_regime
    mathematical_link: "SU(2)_L×U(1)_Y → SSB → U(1)_EM, M_W=g₂v/2, M_Z=√(g₁²+g₂²)v/2, M_A=0"

  - id: deriv.ckm_necessity
    conclusion: cor.ckm_matrix
    conclusion_statement: >
      3-generation SM quark sector: independent Yukawa matrices Y^u, Y^d
      → mass diagonalization → misalignment V_CKM = U^u_L U^{d†}_L ≠ I.
      For n_g=3, V_CKM has 1 irreducible CP-violating phase.
    premise:
      - contingent.sm_gauge_group
      - contingent.sm_fermion_content
      - contingent.sm_higgs_sector
      - kernel.gauge_interactions
      - kernel.spacetime_dimensionality

    variables:
      - { symbol: "Y^u, Y^d", type: "3×3 complex matrices", dim: "[1]", domain: "任意复矩阵", meaning: "Yukawa 耦合矩阵 (up-type, down-type)" }
      - { symbol: "M^u, M^d", type: "3×3 complex matrices", dim: "[M]", domain: "M^{u,d} = Y^{u,d} v/√2", meaning: "夸克质量矩阵 (SSB 后)" }
      - { symbol: "V_CKM", type: "3×3 unitary matrix", dim: "[1]", domain: "V^† V = I", meaning: "Cabibbo-Kobayashi-Maskawa 混合矩阵" }
      - { symbol: "U^{u,d}_L", type: "3×3 unitary matrices", dim: "[1]", domain: "", meaning: "左旋夸克场基变换矩阵 (到质量本征态)" }
      - { symbol: "n_g", type: "ℕ", dim: "[1]", domain: "n_g = 3 (SM)", meaning: "夸克代数" }
      - { symbol: "W^±_μ", type: "vector field", dim: "[M]", domain: "", meaning: "带电弱玻色子 (来自 cor.higgs_mechanism)" }

    steps:
      - step: 1
        description: "三代夸克的 Yukawa 耦合 (SSB 前)"
        expression: >
          L_Yuk = −Y^u_{ij} Q̄^i_L · φ̃ · u^j_R − Y^d_{ij} Q̄^i_L · φ · d^j_R + h.c.
          其中 i,j = 1,2,3 为代指标, Q_L = (u_L, d_L)^T 为 SU(2)_L 二重态
        justification: >
          SM 费米子内容 (contingent.sm_fermion_content) + 规范对称性 (contingent.sm_gauge_group)
          + Higgs 二重态 (contingent.sm_higgs_sector) 共同确定最一般的 Yukawa 耦合形式。
          Y^u 和 Y^d 是独立的任意 3×3 复矩阵 — 没有理论原理要求它们对易或共享对角化基。
          φ̃ = iσ² φ* 是 φ 的共轭二重态 (Y = −1), 用于给 up-type 夸克质量。
        condition: "[N] 3 代夸克 (contingent 事实); SU(2)_L 手征结构 (contingent)"

      - step: 2
        description: "自发对称破缺 → 质量矩阵"
        expression: "φ → (0, v/√2)^T ⇒ M^u_{ij} = Y^u_{ij} v/√2,  M^d_{ij} = Y^d_{ij} v/√2"
        justification: >
          Higgs 取得真空期望值后 (cor.higgs_mechanism), Yukawa 项变为夸克质量项。
          M^u 和 M^d 是任意 3×3 复矩阵 (由 Y^u, Y^d 的任意性决定)。
          这些矩阵不是厄米的, 需要通过双幺正变换对角化。

      - step: 3
        description: "对角化质量矩阵"
        expression: >
          U^u_L M^u U^{u†}_R = diag(m_u, m_c, m_t)
          U^d_L M^d U^{d†}_R = diag(m_d, m_s, m_b)
          其中 U^u_L, U^u_R, U^d_L, U^d_R 均为 3×3 幺正矩阵
        justification: >
          任意复矩阵 M 可以通过双幺正变换对角化 (奇异值分解):
          U_L M U_R^† = diag(m_1, m_2, m_3)。
          对角元 m_i > 0 是夸克质量 (实验测定, 非理论推导)。
          U_L 和 U_R 分别是左旋和右旋夸克场的基变换矩阵。

      - step: 4
        description: "带电弱流在质量本征态中的形式"
        expression: >
          弱相互作用本征态: (u'_L, d'_L) 各为代空间的 3-矢量
          通过 U^u_L, U^d_L 变换到质量本征态:
          d'_L = U^{d†}_L d_L (质量本征态) 等
        justification: >
          质量对角化改变了夸克场的基。但 W^± 玻色子与原始的弱本征态耦合:
          J^{μ+}_CC = ū'_L γ^μ d'_L = ū_L γ^μ (U^u_L U^{d†}_L) d_L。
          这自然地引入了 CKM 矩阵: V_CKM ≡ U^u_L U^{d†}_L。

      - step: 5
        description: "CKM 矩阵的定义与性质"
        expression: "V_CKM = U^u_L U^{d†}_L,  V^†_CKM V_CKM = I (幺正性)"
        justification: >
          两个幺正矩阵的乘积仍是幺正的 → V_CKM 是 3×3 幺正矩阵。
          幺正矩阵有 n_g² 个实参数。减去夸克场的相位重定义自由度
          (2n_g−1 个可移除相位) → 物理参数数 = (n_g−1)²。
          对 n_g=3: 4 个物理参数 = 3 个混合角 + 1 个 CP 破坏复相位。

      - step: 6
        description: "为什么 V_CKM ≠ I (必然有混合)"
        expression: "Y^u 和 Y^d 一般不对易 ⇒ U^u_L ≠ U^d_L ⇒ V_CKM ≠ I"
        justification: >
          若 Y^u 和 Y^d 可用同一组幺正矩阵对角化 (即 [Y^u, Y^d] = 0),
          则 U^u_L = U^d_L ⇒ V_CKM = I → 无代间混合 → 无 s→u, b→c 等味改变过程。
          实验观测到大量味改变弱衰变 (如 K→π, B→D) ⇒ V_CKM ≠ I ⇒ Y^u 和 Y^d 不对易。
          这是 SM 的 contingent 事实 — 为什么 Y^u 和 Y^d 不对易? 目前无更深层解释。
        condition: "[N] Y^u 和 Y^d 是独立的任意复矩阵 — 这是 SM 的基本假设"

      - step: 7
        description: "CP 破坏的必然性 (n_g=3)"
        expression: "对 n_g=3: V_CKM 含 1 个不可约复相位 (Kobayashi-Maskawa 1973)"
        justification: >
          对 n_g=2 (GIM 机制之前): CKM = 2×2 实正交矩阵 → 1 个 Cabibbo 角, 无 CP 破坏。
          对 n_g=3: 幺正矩阵有 1 个复相位不能被夸克场重定义消除 → CP 破坏 (K→ππ, B→J/ψ K_S 等)。
          Kobayashi & Maskawa 在 1973 年 (实验发现 CP 破坏 (Cronin-Fitch 1964) 9 年后,
          第三代夸克被发现 (bottom 1977, top 1995) 之前) 预言了第三代的存在性 —
          这是"理论必要性 → 实验预言 → 实验证实"的标准模型最辉煌的成功之一。
        cross_references:
          - "M1: quarks are fermions (spin-½) → Pauli exclusion → atomic structure → chemistry"
          - "cor.higgs_mechanism: Yukawa → mass → CKM — CKM 推导依赖 Higgs 机制"

    result: "V_CKM = U^u_L U^{d†}_L ≠ I: 4 physical parameters (3 angles + 1 CP phase) for n_g=3"

    necessity_conditions:
      - "3 代费米子 [N]: n_g=2 时只有 1 个 Cabibbo 角, 无 CP 破坏; n_g=3 时恰有 1 个复相位 — Kobayashi-Maskawa 预言"
      - "Y^u, Y^d 独立且不对易 [N]: 若 Y^u ∝ Y^d 或 [Y^u, Y^d]=0 → V_CKM = I — 无味混合"
      - "Higgs 机制 (cor.higgs_mechanism) [N]: 无 SSB → 无质量矩阵 → 无对角化 → 无 CKM"
      - "SU(2)_L 手征结构 [N]: 左右手费米子的不对称 SU(2)_L 表示是 Yukawa 耦合存在的必要条件"

    sufficiency_conditions:
      - "[S] 3 代费米子 + 独立 Y^u, Y^d + Higgs 机制 ⇒ V_CKM 含 1 个 CP 破坏复相位"

    reversible: false
    validity_scope:
      - quantum_regime
    mathematical_link: "Y^u,Y^d independent + Higgs VEV → M^u,M^d → diagonalization → V_CKM=U^u_L U^{d†}_L≠I → flavor mixing + CP violation"
