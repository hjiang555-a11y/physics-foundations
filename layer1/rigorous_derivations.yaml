        expression: "D_total=4 ⇒ N_polarizations = 4·1/2 = 2"
        justification: "代入 D=4。两个独立极化: h_+（plus）和 h_×（cross）。这对应于无质量自旋-2 粒子的两个螺旋度态 (±2)。"

    result: "D=4 时空 ⇒ 2 个独立引力波极化模式 (h_+, h_×)，对应自旋-2 引力子的两个螺旋度态"

    necessity_conditions:
