      - { symbol: "p_kin", type: "ℝ³", dim: "[M·L·T⁻¹]", domain: "", meaning: "动力学动量 p_kin = mv" }

    steps:
      - step: 1
        description: "带电粒子在电磁场中的 Lagrangian"
        expression: "L = ½m|v|² − qφ + q v·A"
        justification: >
          R3 的最小耦合 (minimal coupling) 原理:
          自由粒子 Lagrangian ½mv² 中的动量 p → p − qA,
          能量 E → E − qφ（对于势能的推广）。
          这保证 L 在规范变换 (φ→φ−∂α/∂t, A→A+∇α) 下变一个全导数 d(qα)/dt，
          从而作用量 S = ∫L dt 规范不变。

      - step: 2
        description: "计算正则动量"
        expression: "p_can = ∂L/∂v = mv + qA"
        justification: "∂L/∂v = ∂/∂v[½m|v|² + q v·A] = mv + qA"
        condition: "[N] 规范耦合必须是 p → p − qA 的最小耦合形式"

      - step: 3
        description: "应用 Euler-Lagrange 方程"
        expression: "d(p_can)/dt = ∂L/∂r"
        justification: "G1 结论"

      - step: 4
        description: "计算 ∂L/∂r"
        expression: "∂L/∂r = −q∇φ + q∇(v·A)"
        justification: "A(r,t) 和 φ(r,t) 都是位置的函数"

      - step: 5
        description: "用链式法则展开 d(p_can)/dt"
        expression: >
          d(mv)/dt + q·dA/dt = d(mv)/dt + q(∂A/∂t + (v·∇)A)
        justification: "全导数链式法则: dA(r(t),t)/dt = ∂A/∂t + (∂A/∂r)·(dr/dt) = ∂A/∂t + (v·∇)A"

      - step: 6
        description: "展开 ∂L/∂r"
        expression: >
          ∂L/∂r = −q∇φ + q[(v·∇)A + v×(∇×A)]
        justification: "矢量恒等式: ∇(v·A) = (v·∇)A + v×(∇×A)"

      - step: 7
        description: "代入 Euler-Lagrange 并化简"
        expression: >
          d(mv)/dt + q(∂A/∂t + (v·∇)A) = −q∇φ + q[(v·∇)A + v×(∇×A)]
          ⇒ d(mv)/dt = −q∇φ − q∂A/∂t + q v×(∇×A)
        justification: "两侧的 (v·∇)A 项抵消"

      - step: 8
        description: "用 E 和 B 表示"
        expression: "F = d(mv)/dt = q[−∇φ − ∂A/∂t] + q v×(∇×A) = qE + q v×B"
        justification: "E = −∇φ − ∂A/∂t, B = ∇×A"

    result: "F = q(E + v×B) (Lorentz 力)"

    necessity_conditions:
      - "R3 (最小耦合) [N]: p → p − qA 的替换来自规范不变性要求"
      - "Euler-Lagrange 方程 [N]"
      - "E = −∇φ − ∂A/∂t 和 B = ∇×A 的定义 [N]"

    sufficiency_conditions:
