        expression: ""
        justification: "|h_{μν}| ≪ 1。平直背景 η_{μν} 上加微小扰动。" 
        condition: "[N] weak_field_limit"

      - step: 2
        description: "Einstein 场方程的 (0,0) 分量弱场展开"
        expression: "R_{00} ≈ −½∇²h_{00}"
        justification: "弱场极限下 Ricci 张量线性化。仅保留 h_{μν} 的一阶项。"

      - step: 3
        description: "求解 h_{00}"
        expression: "h_{00} = 2φ/c²"
        justification: >
          从测地线方程 d²x/dt² = −½c²∇h_{00} ⇒ a = −½c²∇h_{00}。
          与 Newton 力学 a = −∇φ 比较 ⇒ h_{00} = 2φ/c²。

      - step: 4
        description: "场方程化为 Poisson 方程"
        expression: "∇²φ = 4πGρ"
        justification: >
          R = −R_{00} ≈ ½∇²h_{00} = ∇²φ/c²。
          T = −ρc² (静态尘埃的应力-能量)。
          R = −κT ⇒ ∇²φ/c² = −κ(−ρc²) = κρc² = (8πG/c⁴)ρc² = 8πGρ/c²。
          ⇒ ∇²φ = 4πGρ。

      - step: 5
        description: "球对称解 ⇒ Newton 万有引力"
        expression: >
          ∇²φ = 4πGρ ⇒ 对于点质量 M: φ = −GM/r
          F = −m∇φ = −GmM/r² · r̂
        justification: "Poisson 方程在球对称下的 Green 函数解。∇(1/r) = −r̂/r²，m 为试探粒子质量。"

    result: "F = −G m₁ m₂ / r² · r̂"

    necessity_conditions:
