  # ═══════════════════════════════════════════════════════════════
  # G4: Maxwell 电磁学 (从规范不变性严格推导)
  # ═══════════════════════════════════════════════════════════════

  # ── G4 基础: 规范场框架 ──

  - id: deriv.maxwell_from_gauge
    conclusion: law.ampere_maxwell
    conclusion_statement: >
      ∂_μ F^{μν} = μ₀ J^ν（协变形式）。
      分量形式: ∇·E = ρ_q/ε₀ (Gauss 电) + ∇×B = μ₀J + μ₀ε₀ ∂E/∂t (Ampère-Maxwell)。
      Bianchi 恒等式: ∂_λ F_{μν} + ∂_μ F_{νλ} + ∂_ν F_{λμ} = 0
      ⇒ ∇·B = 0 (Gauss 磁) + ∇×E = −∂B/∂t (Faraday)。
    premise:
      - kernel.gauge_interactions  # R3
      - kernel.least_action        # R2
      - kernel.lorentz_invariance  # R1
      - kernel.spacetime_dimensionality  # R1

    variables:
      - { symbol: "A_μ", type: "ℝ⁴ → ℝ⁴", dim: "[M·L·T⁻²·I⁻¹]", domain: "C² 规范势场", meaning: "U(1) 规范势四矢量; A_μ = (φ/c, A)" }
      - { symbol: "F_{μν}", type: "ℝ⁴ → ℝ^{4×4} 反对称", dim: "依赖分量", domain: "F_{μν} = ∂_μ A_ν − ∂_ν A_μ", meaning: "电磁场强张量; F_{0i}=E_i/c, F_{ij}=−ε_{ijk}B_k" }
      - { symbol: "J^μ", type: "ℝ⁴ → ℝ⁴", dim: "J⁰=[L⁻³·T·I], Jⁱ=[L⁻²·I]", domain: "∂_μ J^μ = 0 (守恒)", meaning: "四维电流密度; J^μ = (cρ_q, J)" }
      - { symbol: "E", type: "ℝ³ → ℝ³", dim: "[M·L·T⁻³·I⁻¹]", domain: "", meaning: "电场强度" }
      - { symbol: "B", type: "ℝ³ → ℝ³", dim: "[M·T⁻²·I⁻¹]", domain: "", meaning: "磁感应强度" }
      - { symbol: "ε₀", type: "常数", dim: "[M⁻¹·L⁻³·T⁴·I²]", domain: "", meaning: "真空介电常数" }
      - { symbol: "μ₀", type: "常数", dim: "[M·L·T⁻²·I⁻²]", domain: "μ₀ = 1/(ε₀c²)", meaning: "真空磁导率" }

    steps:
      - step: 1
        description: "U(1) 规范场强定义"
        expression: "F_{μν} ≡ ∂_μ A_ν − ∂_ν A_μ"
        justification: >
          R3 (规范不变性): 局域 U(1) 变换 A_μ → A_μ + ∂_μ α(x) 下，
          F_{μν} → ∂_μ(A_ν+∂_να) − ∂_ν(A_μ+∂_μα) = F_{μν}（不变）。
          F_{μν} 是规范不变量。
        condition: "[N] A_μ 的定义来自 R3 的规范补偿场要求"

      - step: 2
        description: "E 和 B 的场强表示"
        expression: >
          F_{0i} = ∂_0 A_i − ∂_i A_0 = −(1/c)∂_t A_i − (1/c)∂_i φ = E_i/c
          F_{ij} = ∂_i A_j − ∂_j A_i = −ε_{ijk} B_k
        justification: >
          E = −∇φ − ∂A/∂t, B = ∇ × A。
          其中 φ ≡ cA₀。
          这是电磁场用规范势表示的经典定义。

      - step: 3
        description: "Maxwell Lagrangian（规范不变 + Lorentz 不变，SI 单位）"
        expression: "L = −(1/4μ₀) F_{μν} F^{μν} − J^μ A_μ"
        justification: >
          F_{μν}F^{μν} 在规范变换下不变且是 Lorentz 标量（R1）。
          系数 1/μ₀ 给出正确的能量量纲和 Newton 极限下的力的耦合。
          物质耦合项 J^μ A_μ: 规范变换 A_μ → A_μ + ∂_μ α(x) 下，
          J^μ A_μ → J^μ A_μ + J^μ ∂_μ α = J^μ A_μ + ∂_μ(α J^μ) − α ∂_μ J^μ。
          配合 ∂_μ J^μ = 0（电荷守恒）后 ∫ L d⁴x 规范不变。
        condition: "[N] L 必须满足 R1 (Lorentz 不变) 和 R3 (规范不变)"

      - step: 4
        description: "应用 Euler-Lagrange 方程于场 A_μ"
        expression: "∂_ν [∂L/∂(∂_ν A_μ)] − ∂L/∂A_μ = 0"
        justification: "R2 (最小作用量) → Euler-Lagrange (G1) 推广到场论: 对每个场分量 A_μ 独立变分。"

      - step: 5
        description: "计算各项变分"
        expression: >
          ∂L/∂(∂_ν A_μ) = −(1/μ₀) F^{νμ}
          ∂L/∂A_μ = −J^μ
        justification: >
          变分 F_{αβ}F^{αβ}:
          δ(F_{αβ}F^{αβ}) = 2F^{αβ}δF_{αβ} = 2F^{αβ}(∂_α δA_β − ∂_β δA_α)
          = 2F^{αβ}∂_α δA_β + 2F^{βα}∂_α δA_β = 4F^{αβ}∂_α δA_β
          所以 δL = −(1/4μ₀)·4F^{αβ}∂_α δA_β = −(1/μ₀)F^{αβ}∂_α δA_β
          ⇒ ∂L/∂(∂_ν A_μ) = −(1/μ₀)F^{νμ}

      - step: 6
        description: "得到 Maxwell 方程（协变形式，SI 单位）"
        expression: "∂_ν F^{νμ} = μ₀ J^μ"
        justification: "∂_ν[−(1/μ₀)F^{νμ}] − (−J^μ) = 0 ⇒ (1/μ₀)∂_ν F^{νμ} = J^μ ⇒ ∂_ν F^{νμ} = μ₀ J^μ"

      - step: 7
        description: "ν = 0 ⇒ Gauss 电定律"
        expression: "∂_i F^{i0} = μ₀ J⁰ ⇒ ∂_i(E_i/c) = μ₀(cρ_q) ⇒ (∇·E)/c = μ₀ c ρ_q ⇒ ∇·E = ρ_q/ε₀"
        justification: "F^{i0} = g^{iα}g^{0β}F_{αβ} = g^{ii}g^{00}F_{i0} = (−1)(1)F_{i0} = −F_{i0} = −(−F_{0i}) = F_{0i} = E_i/c。两个负号抵消（度规 + 反对称）。μ₀ = 1/(ε₀c²)。"

      - step: 8
        description: "ν = i ⇒ Ampère-Maxwell 定律"
        expression: "∂_ν F^{νi} = ∂_0 F^{0i} + ∂_j F^{ji} = μ₀ J^i ⇒ −(1/c²)∂_t E_i + (∇×B)_i = μ₀ J^i ⇒ ∇×B = μ₀J + μ₀ε₀ ∂E/∂t"
        justification: "F^{0i} = g^{0α}g^{iβ}F_{αβ} = g^{00}g^{ii}F_{0i} = (1)(−1)F_{0i} = −E_i/c。F^{ji} = g^{jj}g^{ii}F_{ji} = (−1)(−1)F_{ji} = F_{ji} = −F_{ij} = ε_{ijk}B_k。（注意：ε_{ijk} 非 ε_{jik}，因 F^{ji} = F_{ji} = −F_{ij} = ε_{ijk}B_k）。"

      - step: 9
        description: "Bianchi 恒等式（来自 F = dA 的几何必然）"
        expression: "∂_λ F_{μν} + ∂_μ F_{νλ} + ∂_ν F_{λμ} = 0"
        justification: >
          将 F_{μν} = ∂_μ A_ν − ∂_ν A_μ 代入左边:
          ∂_λ(∂_μ A_ν − ∂_ν A_μ) + ∂_μ(∂_ν A_λ − ∂_λ A_ν) + ∂_ν(∂_λ A_μ − ∂_μ A_λ) ≡ 0。
          这是因为混合偏导数的对称性: ∂_λ∂_μ A_ν − ∂_μ∂_λ A_ν = 0等。
          这是恒等式——不需要任何动力学假设。
        condition: "[N] A_μ ∈ C²（二阶可微）"

      - step: 10
        description: "Bianchi ⇒ Gauss 磁定律"
        expression: >
          取 (μ,ν,λ) = (1,2,3): ∂_1 F_{23} + ∂_2 F_{31} + ∂_3 F_{12} = 0
          F_{23} = B_1, F_{31} = B_2, F_{12} = B_3 ⇒ ∇·B = 0
        justification: "仅空间指标的 Bianchi 恒等式 = ∇·B。磁场散度为零是几何必然——无磁单极子。"

      - step: 11
        description: "Bianchi ⇒ Faraday 感应定律"
        expression: >
          取 (μ,ν,λ) = (0,i,j)（一个时间 + 两个空间指标）:
          ∂_0 F_{ij} + ∂_i F_{j0} + ∂_j F_{0i} = 0
          ⇒ −(1/c)∂_t (ε_{ijk}B_k) + ∂_i (E_j/c) − ∂_j (E_i/c) = 0
          ⇒ ∇×E = −∂B/∂t
        justification: "混合指标 Bianchi 恒等式 = Faraday 定律。变化的磁场产生涡旋电场——这是 F=dA 几何结构的直接推论。"

    result: >
      Maxwell 方程组完整推导完毕:
      ∇·E = ρ_q/ε₀   (Gauss 电 — 来自 ∂_ν F^{ν0} = μ₀ J⁰)
      ∇·B = 0        (Gauss 磁 — 来自 Bianchi 恒等式)
      ∇×E = −∂B/∂t   (Faraday — 来自 Bianchi 恒等式)
      ∇×B = μ₀J + μ₀ε₀ ∂E/∂t  (Ampère-Maxwell — 来自 ∂_ν F^{νi} = μ₀ J^i)

    necessity_conditions:
