        description: "D 维空间中的波动方程"
        expression: "□ φ ≡ [∇² − (1/c²)∂²/∂t²] φ = −4π δ(r) δ(t)"
        justification: "点源在原点、t=0 时发射脉冲。右边为点源项。"
        condition: "[N] 波在自由空间中传播（无介质色散）"

      - step: 2
        description: "Green 函数在 D 维中的形式"
        expression: >
          D=1: G ∝ θ(ct − |r|)（阶跃函数 —— 信号到达后永久不消）
          D=2: G ∝ θ(ct − r)/√(c²t² − r²)（拖尾 —— 信号到达后有无限长余波）
          D=3: G ∝ δ(ct − r)/r（δ 函数 —— 尖锐波前，无拖尾）
        justification: "波动方程 Green 函数的 Hadamard 构造。奇偶维数有本质区别：奇数维有尖锐 δ-函数波前（Huygens 原理成立），偶数维有余尾（afterglow / tail）。"

      - step: 3
        description: "D=3（奇数）⇒ 尖锐波前"
        expression: "G(r,t) ∝ δ(t − r/c)/r ⇒ 信号仅在波前 (r=ct) 处非零"
        justification: "δ-函数保证了波前的尖锐性。听者听到的是清晰的单次信号，而非模糊的混响。这是 Huygens 原理的数学表达：次波仅在波前包络上干涉相长。"
        condition: "[N] D 为奇数（≥3）——D=1 虽为奇数但其 Green 函数为阶跃而非 δ"

      - step: 4
        description: "偶数维 ⇒ 信号拖尾"
        expression: "D=2,4,6,... ⇒ Green 函数有 √(c²t²−r²) 或类似的分母项 ⇒ 波前过后信号持续"
        justification: "Hadamard (1923) 的经典结果。D 为偶数时，Green 函数在主波前 r=ct 之后仍有非零支撑。这被称为 'diffusion within the light cone'。"

    result: "D=3（奇数维）⇒ Green 函数有尖锐 δ-函数波前 ⇒ Huygens 原理成立（清晰信号传播）。偶数空间维 ⇒ 信号拖尾/混响。"

    necessity_conditions:
      - "D=3 空间维数（奇数）[N]: 波动方程的 Green 函数仅在奇数 D 时有尖锐的 δ-函数波前"
      - "自由空间传播: 若存在介质色散，信号仍会拖尾"
      - "波方程的线性性: Green 函数方法要求线性叠加原理成立"

    sufficiency_conditions:
      - "[S] D=3 奇数 + 自由空间波动方程 ⇒ Green 函数 G(r,t) ∝ δ(t − r/c)（尖锐波前，无拖尾）"

    reversible: false
    validity_scope:
      - vacuum
    mathematical_link: "D=3 (odd) ⇒ Green function has sharp delta-function wavefront ⇒ Huygens principle holds"

  - id: deriv.gw_polarizations
    conclusion: contingent.gw_polarizations
    conclusion_statement: "D=4 spacetime ⇒ 2 independent GW polarizations (h_+, h_×)"
    premise:
      - kernel.spacetime_dimensionality
      - kernel.general_covariance

    variables:
      - { symbol: "D_total", type: "ℕ⁺", dim: "[1]", domain: "D_total ≥ 3", meaning: "时空总维数" }
      - { symbol: "h_{μν}", type: "ℝ^{D×D} 对称", dim: "[1]", domain: "|h_{μν}| ≪ 1", meaning: "度规的线性扰动: g_{μν} = η_{μν} + h_{μν}" }
      - { symbol: "h_+", type: "ℝ", dim: "[1]", domain: "", meaning: "引力波 + 极化模式" }
      - { symbol: "h_×", type: "ℝ", dim: "[1]", domain: "", meaning: "引力波 × 极化模式" }

    steps:
      - step: 1
        description: "线性化 GR 中 h_{μν} 的自由度初算"
        expression: "对称 h_{μν} 的独立分量数 = D(D+1)/2"
        justification: "h_{μν} 为 D_total × D_total 对称张量。对于 D_total=4: 10 个分量。"

      - step: 2
        description: "规范自由度（广义协变性）的扣除"
        expression: "坐标变换 x^μ → x^μ + ξ^μ 允许 D 个规范条件 ⇒ 减 D 个自由度"
        justification: "线性化的微分同胚不变性: h_{μν} → h_{μν} − ∂_μ ξ_ν − ∂_ν ξ_μ。选择 Lorentz 规范 ∂^μ h̄_{μν} = 0 消耗 D 个条件。"
        condition: "[N] 广义协变性 (kernel.general_covariance)"

      - step: 3
        description: "进一步的约束"
        expression: "残留规范自由度 + 迹条件再减 D 个"
        justification: "在 Lorentz 规范内仍有余留的规范变换（满足 □ξ_μ = 0 的 ξ_μ 保留 Lorentz 规范）。TT 规范（横向无迹）进一步施加 D 个条件。也可直接从群论论证。"

      - step: 4
        description: "D_{total} 维时空中引力波的独立极化数"
