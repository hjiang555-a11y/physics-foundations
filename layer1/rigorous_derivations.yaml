      - { symbol: "m", type: "ℝ⁺", dim: "[M]", domain: "m ≥ 0 (m=0 for photon)", meaning: "静止质量 (Lorentz 标量); 与参考系无关的不变质量" }
      - { symbol: "τ", type: "ℝ", dim: "[T]", domain: "dτ² = ds²/c² ≥ 0 (timelike)", meaning: "固有时 (R1); 沿粒子世界线的 Lorentz 不变量" }
      - { symbol: "γ", type: "ℝ⁺", dim: "[1]", domain: "γ = dt/dτ = 1/√(1−v²/c²) ≥ 1", meaning: "Lorentz 因子; 时间膨胀的度量" }

    steps:
      - step: 1
        description: "定义四维动量"
        expression: "p^μ ≡ m dx^μ/dτ = (γmc, γmv) = (E/c, p)"
        justification: >
          τ 是固有时 (R1)。四维速度 u^μ = dx^μ/dτ 是 Lorentz 四矢量 (由定义保证:
          dx^μ 是四矢量, dτ 是 Lorentz 标量)。乘以标量 m (静止质量) 得四维动量。
          m 本身是 Lorentz 不变量——这是狭义相对论的核心假设:
          粒子的内禀质量不随参考系改变。

      - step: 2
        description: "时间分量: E = γmc²"
        expression: "p⁰ = m·dx⁰/dτ = m·c·dt/dτ = γmc ⇒ E ≡ p⁰c = γmc²"
        justification: "dτ = dt/γ (时间膨胀)"

      - step: 3
        description: "Lorentz 不变标量"
        expression: "p_μ p^μ = (E/c)² − p² = m²c²"
        justification: >
          p_μ p^μ 是 Lorentz 不变量 (R1)。
          在静止系 (p=0): (E_rest/c)² = m²c² ⇒ E_rest = mc²。

      - step: 4
        description: "任意参考系中的能量-动量关系"
        expression: "E² = p²c² + m²c⁴"
        justification: "从 p_μ p^μ = m²c² 展开"

    result: "E = mc² (静止); E² = p²c² + m²c⁴ (一般)"

    necessity_conditions:
      - "R1 Lorentz 不变性 [N]: p_μ p^μ 必须是不变量"
      - "R1 固有时定义 [N]: dτ 是 Lorentz 不变量，保证四维动量的 Lorentz 矢量性"
      - "m > 0 [N]: 对于无质量粒子 (m=0)，E = pc"

    sufficiency_conditions:
      - "[S] R1 + 四维动量定义 ⇒ E² = p²c² + m²c⁴"

    reversible: true
    validity_scope:
      - relativistic_regime
    mathematical_link: "p^μ = m dx^μ/dτ → p_μ p^μ = m²c² → E² = p²c² + m²c⁴ → E=mc² (p=0)"

  - id: deriv.einstein_field_equations
    conclusion: law.einstein_field
    conclusion_statement: "G_{μν} + Λ g_{μν} = (8πG/c⁴) T_{μν}"
    premise:
      - kernel.equivalence_principle   # R1
      - kernel.general_covariance      # R1
      - kernel.least_action            # R2
      - kernel.spacetime_dimensionality

    variables:
      - { symbol: "R_{μν}", type: "ℝ^(4×4) 对称张量", dim: "[L⁻²]", domain: "", meaning: "Ricci 曲率张量; 描述时空弯曲如何影响体积" }
      - { symbol: "R", type: "ℝ", dim: "[L⁻²]", domain: "R = g^{μν}R_{μν}", meaning: "Ricci 标量曲率" }
      - { symbol: "G_{μν}", type: "ℝ^(4×4) 对称张量", dim: "[L⁻²]", domain: "∇_μ G^{μν} = 0 (Bianchi)", meaning: "Einstein 张量; G_{μν}=R_{μν}−½Rg_{μν}" }
      - { symbol: "T_{μν}", type: "ℝ^(4×4) 对称张量", dim: "[M·L⁻¹·T⁻²]", domain: "∇_μ T^{μν} = 0 (守恒)", meaning: "应力-能量张量" }
      - { symbol: "κ", type: "常数", dim: "[M⁻¹·L⁻¹·T²]", domain: "κ = 8πG/c⁴", meaning: "Einstein 耦合常数" }
      - { symbol: "g", type: "ℝ", dim: "[1]", domain: "g ≡ det(g_{μν}) < 0", meaning: "度规行列式" }

    steps:
      - step: 1
        description: "Lovelock 定理 (1971): D 维时空中最一般的二阶引力 Lagrangian"
        expression: "L_grav = Σ_{k=0}^{⌊D/2⌋} c_k L_k"
        justification: >
          Lovelock 定理证明: 在 D 维时空中，由度规 g_{μν} 及其至多二阶导数构成、
          产生至多二阶场方程的最一般 Lagrange 标量密度是 Lovelock Lagrangian。
          其中 L_k 为 k 阶 Euler 密度:
          L₀ = 1 (宇宙常数项)
          L₁ = R (Ricci 标量, Einstein-Hilbert 项)
          L₂ = R² − 4R_{μν}R^{μν} + R_{μνρσ}R^{μνρσ} (Gauss-Bonnet 项)
          L_k (k ≥ 3) 为更高阶 Euler 密度。各项的变分均产生至多二阶的运动方程。
          此定理不依赖任何特定维度假设 — 它是微分几何的纯数学结果。
        reference: "Lovelock, J.Math.Phys. 12, 498 (1971); Padmanabhan §7.5"
        condition: "[N] 广义协变性 (R1) — Lagrangian 必须是一般协变标量"

      - step: 2
        description: "维度截断: D=4 时仅 k=0,1 项存活"
        expression: "⌊D/2⌋ = ⌊4/2⌋ = 2, 但 L₂ 在 4D 中为拓扑不变量"
        justification: >
          D=4 时, Lovelock 序列包含 k=0 (Λ), k=1 (R), k=2 (Gauss-Bonnet L₂)。
          然而, Chern-Gauss-Bonnet 定理证明: 在 4 维紧致流形上,
          ∫ √(−g) L₂ d⁴x = 32π² χ(M), 其中 χ(M) 为 Euler 示性数 (拓扑不变量)。
          拓扑不变量的变分为零: δ∫ L₂ √(−g) d⁴x ≡ 0。
          因此 L₂ 不贡献任何运动方程 — 它可从作用量中删去而不影响经典动力学。
          更高阶项 L_k (k≥3) 在 4D 中恒为零 (微分形式的阶数超过流形维数)。
        condition: "[N] D=4 — 这是维度特殊性的核心。若 D>4, L₂ 不再是拓扑项, 会产生非平凡的场方程修正"
        reference: "Chern (1944); Gauss-Bonnet-Chern theorem"

      - step: 3
        description: "高阶曲率项为何不合法"
        expression: "R², R_{μν}R^{μν}, R_{μνρσ}R^{μνρσ} 的变分产生四阶导数项 □R 等"
        justification: >
          Lovelock 定理已证明 L_k (k>2) 在 D=4 时恒为零。那么 R², R_{μν}R^{μν} 等标量呢?
          这些不是 Euler 密度 — 它们是曲率张量的代数平方, 不构成 Lovelock Lagrangian。
          它们的变分产生形如 □R 的四阶导数项 → Ostrogradsky 不稳定性 (鬼场)。
          在有效场论框架中, 这些项仅在能量 ≪ Planck 尺度时被压低, 不构成低能引力理论的合法候选。
        condition: "[N] 二阶场方程约束 — 若允许高阶导数, 经典理论存在鬼场 (ghost), 量子理论不可幺正"

      - step: 4
        description: "4D 中唯一合法的纯度规引力 Lagrangian"
        expression: "L_grav = c₀ + c₁ R = −2Λ + R/(2κ)"
        justification: >
          综合 Steps 1-3: 在 4D 时空中, 要求一般协变 + 二阶场方程 ⇒
          Lovelock Lagrangian = c₀·1 + c₁·R, 其中 c₀ = −2Λ, c₁ = 1/(2κ)。
          这是 4D 时空中纯度规引力理论的唯一合法候选。
          耦合常数 Λ, κ 的数值由实验确定 (宇宙学观测 + Newton 极限)。
          Cross-ref M1: 与自旋-统计定理一样, Lovelock 定理的核心依赖于 D=4 —
          两条独立定理从不同侧面印证了时空维数对本宇宙物理定律的唯一性约束。

      - step: 5
        description: "Einstein-Hilbert 作用量"
        expression: "S = (1/(2κ)) ∫ R √(−g) d⁴x + S_matter"
        justification: >
          Step 4 的唯一候选。包含物质场作用量 S_matter。
          系数 1/(2κ) 最终由 Newton 极限 (弱场低速) 的 Poisson 方程 ∇²φ = 4πGρ 确定: κ = 8πG/c⁴。
        condition: "[N] R1 (等效原理 m_i=m_g) 保证引力效应等价于时空几何效应"

      - step: 6
        description: "对度规 g^{μν} 变分"
        expression: "δS = 0 ⇒ δS_gravity/δg^{μν} + δS_matter/δg^{μν} = 0"
        justification: "R2: δS = 0。度规 g^{μν} 是引力场的动力学变量。"

      - step: 7
        description: "引力部分的变分"
        expression: "δ(∫ R√(−g) d⁴x) = ∫ (R_{μν} − ½R g_{μν}) δg^{μν} √(−g) d⁴x"
        justification: >
          计算 δ(R√(−g)) = (δR)√(−g) + R δ√(−g)。
          Palatini 恒等式: δR = R_{μν}δg^{μν} + ∇_α(…)。
          全导数项在积分后消失（边界项假设: δg^{μν}|_∂M = 0）。
          δ√(−g) = −½√(−g)g_{μν}δg^{μν}。
        condition: "[N] g_{μν} ∈ C²（度规二阶可微）"

      - step: 8
        description: "定义 Einstein 张量"
        expression: "G_{μν} ≡ R_{μν} − ½R g_{μν}"
        justification: "G_{μν} 的协变散度自动为零: ∇_μ G^{μν} ≡ 0 (Bianchi 恒等式)"

      - step: 9
        description: "物质部分的变分定义应力-能量张量"
        expression: "T_{μν} ≡ −(2/√(−g)) δS_matter/δg^{μν}"
        justification: "这是 T_{μν} 的标准定义。对于任何广义协变的物质作用量，∇_μ T^{μν} = 0。"

      - step: 10
        description: "场方程"
        expression: "G_{μν} = κ T_{μν} = (8πG/c⁴) T_{μν}"
        justification: >
          Newton 极限 (弱场、低速) 必须恢复 Poisson 方程 ∇²φ = 4πGρ。
          这固定了 κ = 8πG/c⁴。
          加上宇宙学常数 Λ: G_{μν} + Λ g_{μν} = κ T_{μν} 是最一般的散度为零的二阶张量。

    result: "G_{μν} + Λ g_{μν} = (8πG/c⁴) T_{μν}"

