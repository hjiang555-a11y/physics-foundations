  - id: deriv.uncertainty_principle
    conclusion: law.uncertainty_principle
    conclusion_statement: "σ_x·σ_p ≥ ħ/2; ΔE·Δt ≥ ħ/2"
    premise:
      - kernel.canonical_commutation
      - kernel.born_rule
      - kernel.operator_observable
      - kernel.spacetime_dimensionality

    variables:
      - { symbol: "σ_A", type: "ℝ_{\\ge 0}", dim: "与 A 同量纲", domain: "σ_A² = ⟨(Â−⟨Â⟩)²⟩", meaning: "可观测量 A 的标准差" }
      - { symbol: "⟨Â⟩", type: "ℝ", dim: "与 A 同量纲", domain: "⟨Â⟩ = ⟨ψ|Â|ψ⟩", meaning: "期望值 (R5: Born 规则)" }

    steps:
      - step: 1
        description: "Robertson-Schrödinger 不等式"
        expression: "σ_A²·σ_B² ≥ |½⟨[Â,B̂]⟩|² + |½⟨{Â−⟨Â⟩, B̂−⟨B̂⟩}⟩|² ≥ |½⟨[Â,B̂]⟩|²"
        justification: >
          Cauchy-Schwarz 不等式应用于 Hilbert 空间中的态向量
          |f⟩=(Â−⟨Â⟩)|ψ⟩ 和 |g⟩=(B̂−⟨B̂⟩)|ψ⟩:
          ⟨f|f⟩⟨g|g⟩ ≥ |⟨f|g⟩|² = |Re⟨f|g⟩|² + |Im⟨f|g⟩|² ≥ |Im⟨f|g⟩|²。
          而 Im⟨f|g⟩ = ⟨[Â,B̂]⟩/(2i)。
        condition: "[N] Â,B̂ 为厄米算符 (R4d); 期望值由 Born 规则 (R5) 定义"

      - step: 2
        description: "代入 [x̂,p̂] = iħ"
        expression: "σ_x·σ_p ≥ |½⟨iħ⟩| = ħ/2"
        justification: "对易子 [x̂,p̂]=iħ (R4c)。⟨iħ⟩=iħ⟨ψ|ψ⟩=iħ。"

      - step: 3
        description: "能量-时间不确定关系 (Mandelstam-Tamm)"
        expression: "ΔE·Δt ≥ ħ/2"
        justification: >
          时间在标准 QM 中不是算符（Pauli 定理推论）。
          定义 Δt ≡ σ_A/|d⟨A⟩/dt| 为可观测量 A 变化一个标准差所需时间。
          由广义不确定性关系 d⟨A⟩/dt = (i/ħ)⟨[Ĥ,A]⟩ ⇒ σ_H·σ_A ≥ (ħ/2)|d⟨A⟩/dt| ⇒ ΔE·Δt ≥ ħ/2。

    result: "σ_x·σ_p ≥ ħ/2; ΔE·Δt ≥ ħ/2"

    necessity_conditions:
      - "R4c ([x̂,p̂]=iħ) [N]: 不确定性的源头是对易关系的非零性"
      - "R5 (Born 规则) [N]: 方差 ⟨(Â−⟨Â⟩)²⟩ 的定义依赖概率解释"
      - "R4d (厄米算符) [N]: Cauchy-Schwarz 不等式仅在厄米算符的内积语境中适用"

    sufficiency_conditions:
      - "[S] R4c + R4d + R5 ⇒ 不确定性原理"
      - "等号成立条件: Gaussian 波包（最小不确定态 = 相干态）"

    reversible: false
    reverse_note: "σ_xσ_p≥ħ/2 ⇏ [x̂,p̂]=iħ（不确定性可来自其他原因，如经典波包 Fourier 变换限制）"
    validity_scope:
      - quantum_regime
    mathematical_link: "[A,B]=iC → σ_A·σ_B ≥ |⟨C⟩|/2 → [x,p]=iħ → σ_x·σ_p ≥ ħ/2"

