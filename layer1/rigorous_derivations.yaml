      - { symbol: "p̂", type: "H 上厄米算符", dim: "[M·L·T⁻¹]", domain: "", meaning: "动量算符" }
      - { symbol: "x̂", type: "H 上厄米算符", dim: "[L]", domain: "", meaning: "位置算符" }

    steps:
      - step: 1
        description: "R4b 的抽象演化方程"
        expression: "iħ d|ψ(t)⟩/dt = Ĥ|ψ(t)⟩"
        justification: "R4b: 幺正演化 U(t)=exp(−iĤt/ħ) 的无穷小生成元 ⇒ iħ dU/dt = ĤU。应用到 |ψ⟩ 得此式。"
        condition: "[N] R4b 必须成立（孤立系统 + 非测量）"

      - step: 2
        description: "投影到位置表象"
        expression: "⟨r| × (iħ d|ψ⟩/dt = Ĥ|ψ⟩)"
        justification: "左乘 ⟨r| 得到位置表象中的方程。ψ(r,t) ≡ ⟨r|ψ(t)⟩。"

      - step: 3
        description: "确定位置表象中的动量算符"
        expression: "⟨r|p̂|ψ⟩ = −iħ∇ψ(r)"
        justification: >
          R4c: [x̂_i, p̂_j] = iħ δ_{ij}。
          位置表象中 x̂_i 是乘法算符: ⟨r|x̂_i|ψ⟩ = x_i ψ(r)。
          满足对易关系 [x̂_i, p̂_j] = iħ δ_{ij} 的唯一解（Stone-von Neumann 定理）
          是 p̂_j = −iħ ∂/∂x_j。
        condition: "[N] R4c (正则对易关系) 唯一地确定了动量在位置表象中的形式"

      - step: 4
        description: "经典哈密顿量算符化"
        expression: "Ĥ = p̂²/(2m) + V(r̂)"
        justification: >
          R4d (算符-可观测量对应): 经典哈密顿量 H = p²/(2m) + V(r)
          升格为算符: p → p̂ = −iħ∇, r → r̂ = 乘法算符。
          对于非相对论粒子，动能 T = p²/(2m)。

      - step: 5
        description: "代入得坐标表象中的 Schrödinger 方程"
